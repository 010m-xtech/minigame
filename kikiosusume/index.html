<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>味覚クイズ - お店のこだわり発見！</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#e63946', /* 提灯を思わせる赤 */
                        secondary: '#457b9d', /* 落ち着いた青 */
                        accent: '#f4a261', /* 温かみのあるオレンジ */
                        dark: '#1d3557', /* 深い紺色 */
                        light: '#f1faee' /* オフホワイト */
                    }
                }
            }
        }
    </script>
    <style>
        /* カスタムアニメーションと基本設定 */
        :root {
            --sat: env(safe-area-inset-top, 0px);
            --sar: env(safe-area-inset-right, 0px);
            --sab: env(safe-area-inset-bottom, 0px);
            --sal: env(safe-area-inset-left, 0px);
        }

        body {
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
            overscroll-behavior-y: none;
            background-color: #f3f4f6;
        }

        input, textarea {
            -webkit-user-select: auto;
            user-select: auto;
        }

        #app-container {
            max-width: 480px;
            margin: 0 auto;
            height: 100vh; /* スマホ画面の高さに完全固定 */
            height: -webkit-fill-available;
            padding-top: var(--sat);
            padding-bottom: var(--sab);
            padding-left: var(--sal);
            padding-right: var(--sar);
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden; /* 全体スクロールを完全に禁止 */
            display: flex;
            flex-direction: column;
        }

        .screen {
            display: none;
            flex-grow: 1;
            padding: 0.5rem; /* さらにはみ出しを防ぐため余白を極小に */
            overflow: hidden; /* 各画面でもスクロールを一切させない構造 */
            height: 100%;
        }
        
        #screen-top.screen.active {
            display: flex;
            flex-direction: column;
            justify-content: start;
            animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #screen-quiz.screen.active {
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* 縦に綺麗に1画面分配布 */
            animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #screen-result.screen.active {
            display: flex;
            flex-direction: column;
            justify-content: start; /* 解説画面は隙間なく上詰めに連結 */
            animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        #screen-tasting.screen.active {
            display: flex;
            flex-direction: column;
            justify-content: center;
            animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slowFadeIn {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }
        .slow-fade {
            animation: slowFadeIn 0.6s ease-out forwards;
        }
        
        .tap-effect {
            transition: transform 0.1s, opacity 0.1s;
        }
        .tap-effect:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        .img-cover-center {
            object-fit: cover;
            object-position: center;
        }

        @keyframes hintPopUp {
            0% {
                opacity: 0;
                transform: scale(0) translate(20px, 0);
            }
            70% {
                transform: scale(1.05) translate(-2px, 0);
            }
            100% {
                opacity: 1;
                transform: scale(1) translate(0, 0);
            }
        }
        .hint-animate {
            animation: hintPopUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transform-origin: right center;
        }
    </style>
</head>
<body class="font-sans text-gray-800 antialiased h-screen overflow-hidden">

<div id="app-container" class="bg-white">
    
    <img src="gameback.jpg" alt="ゲーム画面背景" class="absolute inset-0 w-full h-full object-cover z-0 pointer-events-none">
    
    <div class="absolute inset-0 w-full h-full bg-white bg-opacity-70 z-[5] pointer-events-none"></div>

    <div id="screen-top" class="screen active relative z-10">
        <header class="text-center mb-1 pt-1 flex flex-col items-center flex-shrink-0">
            <img src="hukuro.jpg" alt="キャラクター" class="w-12 h-auto object-contain mb-0.5 mix-blend-multiply" onerror="this.style.display='none';">
            <h1 class="text-base font-black text-dark tracking-tight drop-shadow-md mb-0.5">味覚クイズに挑戦！</h1>
            
            <div class="bg-white bg-opacity-80 p-1 rounded-xl border border-accent border-opacity-30 inline-block shadow-sm w-full max-w-[90%] mb-1">
                <p class="text-[10px] leading-relaxed text-gray-700 font-bold">
                    目の前の料理を<span class="text-primary text-xs">実際に食べながら</span><br>お店のこだわりに迫ろう！
                </p>
            </div>
        </header>

        <div id="menu-grid" class="grid grid-cols-3 gap-x-1.5 gap-y-2 pb-2 flex-grow overflow-hidden">
        </div>
    </div>


    <div id="screen-tasting" class="screen bg-dark bg-opacity-95 relative z-10">
        <div class="w-full max-w-sm mx-auto flex flex-col items-center slow-fade pt-1 pb-4 z-10">
            <div class="mb-2.5 w-28 h-32 rounded-full overflow-hidden border-4 border-light shadow-2xl bg-gray-800 flex items-center justify-center relative">
                <img src="" id="tasting-image" alt="料理画像" class="w-full h-full img-cover-center absolute inset-0">
            </div>
            
            <h2 class="text-white text-base font-black mb-0.5 tracking-widest drop-shadow-md">まずは、ひとくち。</h2>
            <p class="text-gray-200 text-[11px] mb-3 leading-relaxed text-center px-4">
                <span id="tasting-menu-name" class="text-accent font-bold text-xs border-b border-accent pb-0.5 inline-block mb-1"></span><br>
                香り、食感、そして隠し味...<br>
                じっくりと味わってみてください。
            </p>
            
            <button onclick="showScreen('quiz')" class="w-full max-w-[90%] bg-accent hover:bg-orange-500 text-white font-bold py-2 px-4 rounded-xl shadow-xl tap-effect text-xs animate-pulse">
                味わった！問題へ進む
            </button>
            
            <button onclick="showScreen('top')" class="mt-2 p-1 text-[10px] text-gray-400 tap-effect flex items-center gap-1">
                <svg class="w-2.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                まだ料理が来ていない
            </button>
        </div>

        <div class="absolute bottom-0 left-0 w-full flex justify-center z-0 select-none pointer-events-none">
            <img src="hukuro3.jpg" alt="見上げるキャラクター" class="w-full max-w-[38%] h-auto object-contain mix-blend-multiply block origin-bottom" style="filter: contrast(1.1) brightness(1.05);" onerror="this.style.display='none';">
        </div>
    </div>


    <div id="screen-quiz" class="screen relative z-10">
        <div class="w-full max-w-sm mx-auto flex flex-col flex-grow justify-between h-full">
            <div class="text-center flex-shrink-0 mt-0.5">
                <span id="quiz-menu-name" class="inline-block bg-dark text-white px-2.5 py-0.5 rounded-full text-[8px] font-bold tracking-wider shadow-sm"></span>
            </div>
            
            <div class="text-center flex-shrink-0">
                <h2 class="font-black text-primary text-xs tracking-wide drop-shadow-sm leading-none">MISSION</h2>
                <p class="text-center text-[8px] text-gray-500 font-bold drop-shadow-sm mt-0.5">味覚と嗅覚を研ぎ澄まして考えてみよう！</p>
            </div>

            <div class="w-full h-28 rounded-xl overflow-hidden bg-transparent relative flex-shrink-0 my-0.5">
                <img src="" id="quiz-menu-image" alt="メニュー写真" class="w-full h-full object-contain object-center absolute inset-0">
            </div>
            
            <div class="bg-white bg-opacity-95 px-2.5 py-1.5 rounded-xl shadow-sm border border-gray-100 relative flex-shrink-0 my-0.5">

            </div>

            <div id="quiz-options" class="space-y-1 relative z-10 flex-shrink-0">
            </div>
            
            <div class="w-full flex justify-end select-none relative flex-shrink-0 my-0.5">

            </div>

    <div id="screen-result" class="screen pt-0.5 relative z-10">

                    <p id="result-explanation" class="text-[10px] leading-tight text-gray-700 font-medium"></p>
                </div>
            </div>

            <div class="bg-white bg-opacity-95 rounded-xl shadow-sm border border-gray-100 p-1.5 flex-shrink-0 flex items-center gap-1.5 relative z-10 mb-1">

                    <p id="result-drink-reason" class="text-[8.5px] font-medium text-gray-500 mt-0.5 leading-none truncate"></p>
                </div>
            </div>

            <div class="bg-white bg-opacity-90 border border-accent border-opacity-30 rounded-xl p-1.5 text-center flex-shrink-0 shadow-sm relative z-10 mb-1.5">

                </button>
            </div>
        </div>
    </div>

</div>

            nextRecommend: "スタミナチャージ！次は「生レバーのジュワッと焼き」をどうぞ。",
            drinks: [
                { name: "ザ・プレミアム・モルツ", reason: "溢れ出るアツアツのジューシーな肉汁には、黄金の生ビールが正義！" },
                { name: "ジムビームハイボール", reason: "餡のニンニクや肉の旨味を、弾ける泡が爽やかに包み込みます。" },
                { name: "いつものレモンサワー", reason: "パリッと焼けた香ばしい衣の油を、レモン果汁がサッパリ洗い流します。" }
            ]
        },
        {
            id: 8, name: "赤鶏のお刺身", image: "torisashi.jpg",
            question: "この新鮮な赤鶏のお刺身、どこのエリアのご当地醤油を合わせて提供しているでしょう？",
            options: ["北海道", "関東", "九州"],
            answerIndex: 2,
            hint: "💡ヒント：鳥刺し文化が盛んで、お醤油がトロッと甘くて濃いエリアといえば？",
            explanation: "新鮮な赤鶏の弾力と甘みを引き立てるため、『九州』特有のコクのある甘口醤油をわざわざ取り寄せ使用しています。",
            nextRecommend: "お刺身の後は、あつあつの「ふくろうミンチ」がおすすめです。",
            drinks: [
                { name: "だいやめ", reason: "九州の甘口醤油と、このフルーティーな芋焼酎の組み合わせは真骨頂！" },
                { name: "カルダモン焼酎", reason: "洗練された清涼感が、地鶏ならではの引き締まった弾力を際立たせます。" },
                { name: "国盛 本醸造辛口", reason: "淡麗な辛口が、甘口醤油を纏った鶏のねっとりとした脂を綺麗に引き締めます。" }
            ]
        },
        {
            id: 9, name: "ふくろうミンチ", image: "mince.jpg",
            question: "名物「ふくろうミンチ」、ふんわりとした食感の秘密としてお肉に混ぜられているのは？",
            options: ["山芋", "豆腐", "パン粉"],
            answerIndex: 0,
            hint: "💡ヒント：すりおろすとネバネバするあのお野菜だよ！",
            explanation: "新鮮な鶏ミンチにすりおろした『山芋』を練り込むことで、外はカリッと、中は驚くほどふんわりとした食感を実現しています。",
            nextRecommend: "〆にはさっぱりとした「海鮮プチぜいたく盛り」をもう一度！",
            drinks: [
                { name: "ザ・プレミアム・モルツ", reason: "カリッと香ばしい名物のミンチ肉には、冷えたビールの喉越しが最高。" },
                { name: "ジムビームハイボール", reason: "山芋のふんわり軽い食感に, ハイボールの爽快な泡が軽快にマッチ。" },
                { name: "いつものレモンサワー", reason: "ジューシーな鶏の旨味を、レモンの爽やかな酸味が引き締めます。" }
            ]
        }
    ];

    const fallbackImage = "data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2394a3b8'%3E%3Cpath d='M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z'/%3E%3C/svg%3E";

    let currentQuiz = null;
    let hintTimer = null; 

    document.addEventListener('DOMContentLoaded', () => {
        renderMenuGrid();
    });

    function showScreen(screenName) {
        document.querySelectorAll('.screen').forEach(el => {
            el.classList.remove('active');
        });
        const target = document.getElementById(`screen-${screenName}`);
        if(target) {
            target.classList.add('active');
            target.scrollTop = 0; 
        }

        if (screenName === 'quiz') {
            startHintTimer();
        } else {
            clearHintTimer(); 
        }
    }

    function startHintTimer() {
        clearHintTimer(); 

        const bubble = document.getElementById('quiz-hint-bubble');
        bubble.classList.remove('hint-animate', 'opacity-100', 'scale-100');
        bubble.classList.add('opacity-0', 'scale-0');

        if(currentQuiz && currentQuiz.hint) {
            document.getElementById('quiz-hint-text').textContent = currentQuiz.hint;
            
            hintTimer = setTimeout(() => {
                bubble.classList.remove('opacity-0', 'scale-0');
                bubble.classList.add('hint-animate');
            }, 10000);
        }
    }

    function clearHintTimer() {
        if (hintTimer) {
            clearTimeout(hintTimer);
            hintTimer = null;
        }
    }

    function cancelQuiz() {
        clearHintTimer();
        showScreen('top');
    }

    function renderMenuGrid() {
        const grid = document.getElementById('menu-grid');
        grid.innerHTML = ''; 

        menuData.forEach(item => {
            const tile = document.createElement('div');
            tile.className = "flex flex-col items-center tap-effect cursor-pointer group";
            tile.onclick = () => startQuiz(item.id);

            tile.innerHTML = `
                <div class="w-full aspect-square rounded-xl mb-0.5 shadow-sm border border-white group-hover:border-primary overflow-hidden bg-white flex items-center justify-center relative">
                    <img src="${item.image}" alt="${item.name}" class="w-full h-full img-cover-center absolute inset-0" onerror="this.src='${fallbackImage}'; this.className='w-1/2 h-1/2 object-contain opacity-50 absolute top-1/4 left-1/4';">
                </div>
                <p class="text-[10px] font-bold text-center leading-tight text-gray-800 w-full truncate px-1 drop-shadow-sm">${item.name}</p>
            `;
            grid.appendChild(tile);
        });
    }

    function startQuiz(menuId) {
        currentQuiz = menuData.find(item => item.id === menuId);
        if(!currentQuiz) return;

        document.getElementById('tasting-menu-name').textContent = currentQuiz.name;
        
        const tastingImg = document.getElementById('tasting-image');
        tastingImg.src = currentQuiz.image;
        tastingImg.className = "w-full h-full img-cover-center absolute inset-0"; 
        tastingImg.onerror = function() {
            this.src = fallbackImage;
            this.className = "w-1/2 h-1/2 object-contain opacity-50 absolute top-1/4 left-1/4";
        };

        const quizMenuImg = document.getElementById('quiz-menu-image');
        quizMenuImg.src = currentQuiz.image;
        quizMenuImg.onerror = function() {
            this.src = fallbackImage;
        };

        document.getElementById('quiz-menu-name').textContent = currentQuiz.name;
        document.getElementById('quiz-question').textContent = currentQuiz.question;
        
        const optionsContainer = document.getElementById('quiz-options');
        optionsContainer.innerHTML = '';

        currentQuiz.options.forEach((optionText, index) => {
            const btn = document.createElement('button');
            btn.className = "w-full bg-white bg-opacity-95 border border-white text-gray-800 font-bold py-1.5 px-3.5 rounded-xl text-left shadow-sm tap-effect text-[12px] active:border-secondary transition-colors flex items-center";
            btn.onclick = () => checkAnswer(index);
            
            btn.innerHTML = `
                <div class="w-7 h-7 rounded-md bg-gray-100 flex items-center justify-center mr-3 flex-shrink-0">
                    <img src="number${index + 1}.jpg" alt="${index + 1}" class="w-full h-full object-contain object-center" onerror="this.style.display='none';">
                </div>
                <span class="leading-tight">${optionText}</span>
            `;
            optionsContainer.appendChild(btn);
        });

        showScreen('tasting');
    }

    function checkAnswer(selectedIndex) {
        clearHintTimer(); 
        
        const isCorrect = (selectedIndex === currentQuiz.answerIndex);
        const header = document.getElementById('result-header');
        
        if (isCorrect) {
            header.innerHTML = `
                <div class="inline-flex items-center justify-center w-14 h-14 bg-green-50 mb-0.5 shadow-sm border-2 border-white rounded-xl overflow-hidden p-0.5">
                    <img src="ok.jpg" alt="正解アイコン" class="w-full h-full object-contain object-center mix-blend-multiply" onerror="this.style.display='none';">
                </div>
                <h2 class="text-base font-black text-green-600 tracking-widest drop-shadow-sm leading-none">大正解！</h2>
            `;
        } else {
            header.innerHTML = `
                <div class="inline-flex items-center justify-center w-14 h-14 bg-red-50 mb-0.5 shadow-sm border-2 border-white rounded-xl overflow-hidden p-0.5">
                    <img src="zannen.jpg" alt="残念アイコン" class="w-full h-full object-contain object-center mix-blend-multiply" onerror="this.style.display='none';">
                </div>
                <h2 class="text-base font-black text-primary tracking-widest drop-shadow-sm leading-none">ざんねん！</h2>
            `;
        }

        const matchedDrinks = currentQuiz.drinks;
        const randomDrinkObj = matchedDrinks[Math.floor(Math.random() * matchedDrinks.length)];

        document.getElementById('result-correct-answer').textContent = currentQuiz.options[currentQuiz.answerIndex];
        document.getElementById('result-explanation').textContent = currentQuiz.explanation;
        
        document.getElementById('result-drink-pairing').textContent = randomDrinkObj.name; 
        document.getElementById('result-drink-reason').textContent = randomDrinkObj.reason; 
        
        document.getElementById('result-recommend').innerHTML = currentQuiz.nextRecommend;

        showScreen('result');
    }
</script>
