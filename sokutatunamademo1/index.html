	
	<!DOCTYPE html>
	<html lang="ja">
	<head>
	  <meta charset="UTF-8">
	  <meta name="viewport" content="width=device-width, initial-scale=1.0">
	  <title>速達生クイズ</title>
	  
	  <!-- Tailwind CSS (デザイン用) -->
	  <script src="https://cdn.tailwindcss.com"></script>
	  
	  <!-- React本体 -->
	  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
	  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
	  
	  <!-- Babel (Reactのコードをブラウザ用に変換) -->
	  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
	</head>
	<body>
	  <div id="root"></div>
	
	  <script type="text/babel">
	    const { useState } = React;
	
	    // --- アイコンの設定 (lucide-reactの代わりにSVGを直接定義) ---
	    const Beer = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 11h1.221a4 4 0 0 1 3.951 3.334C22.42 16.486 21 18 19 18h-2"/><path d="M11 2v4"/><path d="M15 2v4"/><path d="M7 2v4"/><path d="M5 6h14"/><path d="M5 6v14a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V6"/></svg>;
	    const CheckCircle2 = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;
	    const XCircle = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>;
	    const ArrowRight = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
	    const Trophy = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
	    const PartyPopper = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5.8 11.3 2 22l10.7-3.79"/><path d="M4 3h.01"/><path d="M22 8h.01"/><path d="M15 2h.01"/><path d="M22 20h.01"/><path d="m22 2-2.24.75a2.9 2.9 0 0 0-1.96 3.12v0c.1.86-.57 1.63-1.45 1.63h-.38c-.86 0-1.6.6-1.76 1.44L14 10"/><path d="m22 13-.82-.33c-.86-.34-1.82.2-1.98 1.11v0c-.11.7-.72 1.22-1.43 1.22H17"/><path d="m11 2 .33.82c.34.86-.2 1.82-1.11 1.98v0C9.52 4.9 9 5.52 9 6.23V7"/><path d="M11 13c1.93 1.93 2.83 4.17 2 5-.83.83-3.07-.07-5-2-1.93-1.93-2.83-4.17-2-5 .83-.83 3.07.07 5 2Z"/></svg>;
	
	    // クイズデータ
	    const questions = [
	      {
	        question: "「速達生」は生ビール製造工場出荷から原則として何日以内に飲食店へ届けられるでしょうか？（※一部例外有り）",
	        options: ["A. 当日中", "B. 2日以内", "C. 5日以内", "D. 2週間以内"],
	        answerIndex: 1, // B. 2日以内
	        explanation: "一般的には3日〜2週間かかるリードタイムを短縮し、原則2日以内に届けられます。"
	      },
	      {
	        question: "「速達生」が対象としているビールメーカーはアサヒ、サントリー、キリンと、あともう1社はどこでしょうか？",
	        options: ["A. オリオン", "B. ギネス", "C. サッポロ", "D. ミツカン"],
	        answerIndex: 2, // C. サッポロ
	        explanation: "サッポロからは「黒ラベル」と「エビス」の2銘柄を取り扱っています。"
	      },
	      {
	        question: "鮮度の透明性を確保するため、鮮度の見える化として全ての生ビールの樽に貼り付けられているものは何でしょうか？",
	        options: ["A. 日付の書いた付箋", "B. 賞味期限ラベル", "C. 何もなし", "D. 工場出荷日保証シール"],
	        answerIndex: 3, // D. 工場出荷日保証シール
	        explanation: "全ての生ビールの樽にこのシールを貼り付けることで、鮮度の見える化を行っています。"
	      },
	      {
	        question: "新鮮でおいしいビールを飲み干したグラスに美しく残る「泡の輪」のことを何と呼ぶでしょうか？",
	        options: ["A. ビア・リング", "B. スノー・リング", "C. エンジェル・リング", "D. ハッピーリング"],
	        answerIndex: 3, // D. ハッピーリング
	        explanation: "味・泡・香りのすべてが整ったときにのみ生まれる、お客様の「おいしい！」を引き出す幸せの証です。"
	      },
	      {
	        question: "「四原則2カ条」において、洗浄した後のジョッキやグラスはどのように乾かすべきだと定められているでしょうか？",
	        options: ["A. 乾いた清潔な布巾で拭く", "B. 自然乾燥させる", "C. 食器用乾燥機を使う", "D. ペーパータオルで拭き取る"],
	        answerIndex: 1, // B. 自然乾燥させる
	        explanation: "他の食器とは一緒に洗わず、洗浄後は自然乾燥させることが定められています。"
	      }
	    ];
	
	    function App() {
	      const [gameState, setGameState] = useState('start');
	      const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
	      const [score, setScore] = useState(0);
	      const [showExplanation, setShowExplanation] = useState(false);
	      const [selectedAnswer, setSelectedAnswer] = useState(null);
	
	      const startGame = () => {
	        setGameState('playing');
	        setCurrentQuestionIndex(0);
	        setScore(0);
	        setShowExplanation(false);
	        setSelectedAnswer(null);
	      };
	
	      const handleAnswer = (index) => {
	        setSelectedAnswer(index);
	        setShowExplanation(true);
	        if (index === questions[currentQuestionIndex].answerIndex) {
	          setScore(score + 1);
	        }
	      };
	
	      const nextQuestion = () => {
	        if (currentQuestionIndex < questions.length - 1) {
	          setCurrentQuestionIndex(currentQuestionIndex + 1);
	          setShowExplanation(false);
	          setSelectedAnswer(null);
	        } else {
	          setGameState('result');
	        }
	      };
	
	      const containerClass = gameState === 'start'
	        ? "min-h-screen bg-gradient-to-br from-gray-900 via-black to-gray-800 font-sans relative overflow-hidden flex items-center justify-center p-4 transition-colors duration-700"
	        : "min-h-screen bg-gradient-to-b from-yellow-300 via-amber-400 to-amber-500 font-sans text-gray-800 relative overflow-hidden flex items-center justify-center p-4 transition-colors duration-700";
	
	      const BeerFoam = () => (
	        <div className="absolute top-0 left-0 w-full z-0 overflow-hidden h-32">
	          <div className="absolute -top-4 -left-4 w-32 h-32 bg-white rounded-full opacity-90 mix-blend-overlay"></div>
	          <div className="absolute -top-10 left-10 w-40 h-40 bg-white rounded-full opacity-95 mix-blend-overlay"></div>
	          <div className="absolute -top-2 left-24 w-28 h-28 bg-white rounded-full opacity-80 mix-blend-overlay"></div>
	          <div className="absolute -top-6 left-1/3 w-36 h-36 bg-white rounded-full opacity-90 mix-blend-overlay -translate-x-1/2"></div>
	          <div className="absolute -top-12 left-1/2 w-48 h-48 bg-white rounded-full opacity-95 mix-blend-overlay -translate-x-1/2"></div>
	          <div className="absolute top-2 left-2/3 w-24 h-24 bg-white rounded-full opacity-70 mix-blend-overlay -translate-x-1/2"></div>
	          <div className="absolute -top-8 right-32 w-36 h-36 bg-white rounded-full opacity-85 mix-blend-overlay"></div>
	          <div className="absolute -top-10 right-16 w-40 h-40 bg-white rounded-full opacity-90 mix-blend-overlay"></div>
	          <div className="absolute top-0 right-8 w-20 h-20 bg-white rounded-full opacity-80 mix-blend-overlay"></div>
	          <div className="absolute -top-4 -right-4 w-32 h-32 bg-white rounded-full opacity-95 mix-blend-overlay"></div>
	        </div>
	      );
	
	      return (
	        <div className={containerClass}>
	          {gameState !== 'start' && <BeerFoam />}
	
	          <div className="relative z-10 w-full max-w-md mx-auto">
	            {/* === スタート画面 === */}
	            {gameState === 'start' && (
	              <div className="bg-zinc-900/90 p-8 rounded-[2rem] shadow-2xl border border-zinc-700 text-center transform transition-all backdrop-blur-sm">
	                <div className="flex justify-center mb-6">
	                  <div className="bg-gradient-to-br from-amber-400 to-amber-600 p-4 rounded-full shadow-[0_0_20px_rgba(245,158,11,0.3)]">
	                    <Beer size={64} className="text-white" />
	                  </div>
	                </div>
	                <p className="text-lg font-bold text-gray-300 mb-4 tracking-tight">QRを読み込んでしまったあなた、</p>
	                <p className="text-2xl font-extrabold text-amber-500 mb-2">突然ですが....</p>
	                <p className="text-4xl font-black text-amber-500 mb-8 drop-shadow-[0_2px_15px_rgba(245,158,11,0.4)]">問題です！！</p>
	                
	                <button 
	                  onClick={startGame}
	                  className="w-full py-4 bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 text-white text-xl font-bold rounded-2xl shadow-[0_0_15px_rgba(245,158,11,0.3)] transition-all transform hover:scale-105 flex items-center justify-center gap-2"
	                >
	                  <Beer size={24} /> クイズに挑戦する！
	                </button>
	              </div>
	            )}
	
	            {/* === プレイ画面 === */}
	            {gameState === 'playing' && (
	              <div className="bg-white/95 rounded-[2rem] p-6 shadow-2xl border-2 border-yellow-200">
	                <div className="flex items-center justify-between mb-6">
	                  <span className="bg-amber-500 text-white px-4 py-1.5 rounded-full text-sm font-bold shadow">
	                    Q {currentQuestionIndex + 1} / {questions.length}
	                  </span>
	                  <span className="text-amber-600 font-bold text-sm">
	                    速達生クイズ
	                  </span>
	                </div>
	                
	                <h2 className="text-xl font-bold text-gray-800 mb-6 leading-relaxed">
	                  {questions[currentQuestionIndex].question}
	                </h2>
	                
	                <div className="space-y-3">
	                  {questions[currentQuestionIndex].options.map((option, index) => {
	                    const isCorrect = index === questions[currentQuestionIndex].answerIndex;
	                    const isSelected = index === selectedAnswer;
	                    
	                    let buttonStyle = 'bg-white border-gray-200 hover:border-amber-400 hover:bg-amber-50 text-gray-700';
	                    
	                    if (showExplanation) {
	                      if (isCorrect) {
	                        buttonStyle = 'bg-green-100 border-green-500 text-green-800 shadow-inner';
	                      } else if (isSelected) {
	                        buttonStyle = 'bg-red-100 border-red-400 text-red-800';
	                      } else {
	                        buttonStyle = 'bg-white border-gray-200 text-gray-400 opacity-60';
	                      }
	                    }
	
	                    return (
	                      <button
	                        key={index}
	                        onClick={() => handleAnswer(index)}
	                        disabled={showExplanation}
	                        className={`w-full text-left p-4 rounded-xl border-2 font-bold transition-all ${buttonStyle}`}
	                      >
	                        <div className="flex items-center justify-between">
	                          <span>{option}</span>
	                          {showExplanation && isCorrect && <CheckCircle2 className="text-green-600" size={20} />}
	                          {showExplanation && isSelected && !isCorrect && <XCircle className="text-red-500" size={20} />}
	                        </div>
	                      </button>
	                    );
	                  })}
	                </div>
	
	                {/* 解説エリア */}
	                {showExplanation && (
	                  <div className="mt-6 animate-fade-in">
	                    <div className={`p-5 rounded-2xl flex items-start gap-3 border ${
	                      selectedAnswer === questions[currentQuestionIndex].answerIndex 
	                        ? 'bg-green-50 border-green-200 text-green-900' 
	                        : 'bg-red-50 border-red-200 text-red-900'
	                    }`}>
	                      {selectedAnswer === questions[currentQuestionIndex].answerIndex 
	                        ? <CheckCircle2 className="shrink-0 mt-0.5 text-green-600" /> 
	                        : <XCircle className="shrink-0 mt-0.5 text-red-500" />
	                      }
	                      <div>
	                        <p className="font-extrabold text-lg mb-2">
	                          {selectedAnswer === questions[currentQuestionIndex].answerIndex ? '大正解！' : '残念！'}
	                        </p>
	                        <p className="text-sm leading-relaxed font-medium">
	                          {questions[currentQuestionIndex].explanation}
	                        </p>
	                      </div>
	                    </div>
	                    
	                    <button 
	                      onClick={nextQuestion} 
	                      className="mt-6 w-full py-4 bg-gray-800 hover:bg-black text-white font-bold rounded-xl shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95"
	                    >
	                      {currentQuestionIndex < questions.length - 1 ? '次の問題へ' : '結果を見る'} <ArrowRight size={20} />
	                    </button>
	                  </div>
	                )}
	              </div>
	            )}
	
	            {/* === 結果画面 === */}
	            {gameState === 'result' && (
	              <div className="bg-white/95 p-8 rounded-[2rem] shadow-2xl border-4 border-yellow-200 text-center">
	                <div className="flex justify-center mb-4">
	                  {score === questions.length ? (
	                    <div className="bg-yellow-100 p-4 rounded-full relative">
	                      <PartyPopper size={64} className="text-yellow-600" />
	                      <Trophy size={32} className="text-yellow-500 absolute -bottom-2 -right-2" />
	                    </div>
	                  ) : (
	                    <div className="bg-amber-100 p-4 rounded-full">
	                      <Beer size={64} className="text-amber-500" />
	                    </div>
	                  )}
	                </div>
	                
	                <h2 className="text-2xl font-bold text-gray-800 mb-2">クイズ結果</h2>
	                <div className="text-5xl font-black text-amber-500 mb-6 flex justify-center items-baseline gap-2">
	                  {score} <span className="text-2xl text-gray-600 font-bold">/ {questions.length}問正解</span>
	                </div>
	
	                <div className="bg-gray-100 rounded-xl p-4 mb-8">
	                  <p className="font-bold text-gray-700">
	                    {score === questions.length && "パーフェクト！あなたは真の速達生マスターです！乾杯！"}
	                    {score >= 3 && score < questions.length && "惜しい！もう少し！美味しいビールが待ってますよ！"}
	                    {score < 3 && "まだまだこれから！お店で美味しい速達生を飲んで復習しよう！"}
	                  </p>
	                </div>
	              </div>
	            )}
	            
	          </div>
	        </div>
	      );
	    }
	
	    // Reactアプリのレンダリング
	    const root = ReactDOM.createRoot(document.getElementById('root'));
	    root.render(<App />);
	  </script>
	</body>
	</html>
