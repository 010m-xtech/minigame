<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ティンカーベルとロンドンの夜空 - 究極の左右対称ハート版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("nightview.png");
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            overflow: hidden;
            height: 100vh;
            position: relative;
            cursor: none; 
        }

        #tinkerbell {
            position: fixed;
            width: 50px;  
            height: 50px;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%); 
            
            background-image: url("pixielight.png");
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;

            filter: drop-shadow(0 0 8px rgba(255, 235, 180, 0.95)) 
                    drop-shadow(0 0 18px rgba(255, 200, 130, 0.7));
        }

        .pixie-dust {
            position: fixed;
            top: 0;
            left: 0;
            width: 12px;
            height: 12px;
            background-color: #a7f3d0; 
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #38bdf8, 0 0 18px #0ea5e9; 
        }

        .title {
            position: absolute;
            top: 20%;
            width: 100%;
            text-align: center;
            color: #e2e8f0;
            font-family: 'Georgia', serif;
            letter-spacing: 2px;
            pointer-events: none;
            text-shadow: 0 3px 6px rgba(0,0,0,0.6);
        }
        h1 { font-size: 28px; font-weight: normal; opacity: 0.9; }
    </style>
</head>
<body>

    <div class="title">
        <h1>You can fly!</h1>
    </div>

    <div id="tinkerbell"></div>

    <script>
        // 【特定していただいた完璧な座標】
        const PHOTO_TARGET_X = 440;
        const PHOTO_TARGET_Y = 1200;
        
        const PHOTO_WIDTH = 1082;
        const PHOTO_HEIGHT = 1939;

        const tink = document.getElementById('tinkerbell');
        const DUST_COUNT = 35; 
        const dustParticles = [];
        
        let goalX = window.innerWidth / 2;
        let goalY = window.innerHeight / 2;
        const mouse = { x: goalX, y: goalY };

        let isAutoFlying = true;
        let startTime = null;
        
        // 【大改造】動きのフェーズを分けました
        const HEART_DURATION = 3000; // ハートを描く時間（3秒）
        const LAND_DURATION = 1000;  // 描き終わってから着地するまでの時間（1秒）
        const TOTAL_AUTO_DURATION = HEART_DURATION + LAND_DURATION; // 合計4秒

        function calculateScreenCoordinates() {
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const windowRatio = windowWidth / windowHeight;
            const imageRatio = PHOTO_WIDTH / PHOTO_HEIGHT;

            let renderWidth, renderHeight;
            let offsetX = 0, offsetY = 0;

            if (windowRatio > imageRatio) {
                renderWidth = windowWidth;
                renderHeight = windowWidth / imageRatio;
                offsetY = (renderHeight - windowHeight) / 2;
            } else {
                renderHeight = windowHeight;
                renderWidth = windowHeight * imageRatio;
                offsetX = (renderWidth - windowWidth) / 2;
            }

            goalX = (PHOTO_TARGET_X / PHOTO_WIDTH) * renderWidth - offsetX;
            goalY = (PHOTO_TARGET_Y / PHOTO_HEIGHT) * renderHeight - offsetY;
        }

        calculateScreenCoordinates();
        
        // 最初のスタート位置は、ハートの描き始め（てっぺんのくぼみ）にする
        const initialHeartSize = Math.min(window.innerWidth, window.innerHeight) * 0.35;
        const initialCenterY = goalY - (initialHeartSize * 0.8);
        const initialStartY = initialCenterY - (initialHeartSize * (4 / 16)); // ハートの上のくぼみのY座標
        
        mouse.x = goalX;
        mouse.y = initialStartY;
        tink.style.left = goalX + 'px';
        tink.style.top = initialStartY + 'px';

        for (let i = 0; i < DUST_COUNT; i++) {
            const dust = document.createElement('div');
            dust.classList.add('pixie-dust');
            const scale = 1 - (i / DUST_COUNT);
            const opacity = 1 - (i / DUST_COUNT);
            dust.style.transform = `translate(-50%, -50%) scale(${scale})`;
            dust.style.opacity = opacity;
            
            const mixColor = i % 2 === 0 ? '#e0f2fe' : '#7dd3fc';
            dust.style.backgroundColor = mixColor;
            dust.style.left = goalX + 'px';
            dust.style.top = initialStartY + 'px';

            document.body.appendChild(dust);
            dustParticles.push({ element: dust, x: goalX, y: initialStartY });
        }

        window.addEventListener('resize', () => {
            calculateScreenCoordinates();
            if (!isAutoFlying) {
                mouse.x = goalX;
                mouse.y = goalY;
            }
        });

        function updatePosition(x, y) {
            if (isAutoFlying) return; 
            mouse.x = x;
            mouse.y = y;
            tink.style.left = x + 'px';
            tink.style.top = y + 'px';
        }

        window.addEventListener('mousemove', (e) => { updatePosition(e.clientX, e.clientY); });
        window.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) {
                e.preventDefault();
                updatePosition(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });
        window.addEventListener('touchstart', (e) => {
            if(e.touches.length > 0) { updatePosition(e.touches[0].clientX, e.touches[0].clientY); }
        });

        function animate(timestamp) {
            if (!startTime) startTime = timestamp;
            const elapsed = timestamp - startTime;

            if (isAutoFlying) {
                if (elapsed < HEART_DURATION) {
                    // ------------ フェーズ1：純粋に綺麗なハートを描く（3秒間） ------------
                    const progress = elapsed / HEART_DURATION; 
                    
                    // 【ご要望通り】通常のプラスなので「時計回り（右側からスタート）」です！
                    const angle = progress * Math.PI * 2; 
                    
                    const heartSize = Math.min(window.innerWidth, window.innerHeight) * 0.35; 

                    // 純粋なハートの方程式（ブレンド処理を混ぜないため、左右対称が完全に保たれます）
                    const hX = 16 * Math.pow(Math.sin(angle), 3);
                    const hY = -(13 * Math.cos(angle) - 5 * Math.cos(2*angle) - 2 * Math.cos(3*angle) - Math.cos(4*angle));

                    const centerX = goalX;
                    const centerY = goalY - (heartSize * 0.8); 

                    mouse.x = centerX + (hX * (heartSize / 16));
                    mouse.y = centerY + (hY * (heartSize / 16));

                    tink.style.left = mouse.x + 'px';
                    tink.style.top = mouse.y + 'px';

                } else if (elapsed < TOTAL_AUTO_DURATION) {
                    // ------------ フェーズ2：描き終わった後、ゴールへ優雅に着地（1秒間） ------------
                    const landProgress = (elapsed - HEART_DURATION) / LAND_DURATION;
                    
                    // アニメーションを滑らかにするイージング（最初はゆっくり、あとからピタッと）
                    const easeOutQuad = 1 - (1 - landProgress) * (1 - landProgress);

                    // ハートの終着点（上のくぼみ）
                    const heartSize = Math.min(window.innerWidth, window.innerHeight) * 0.35;
                    const centerY = goalY - (heartSize * 0.8);
                    const endHeartX = goalX;
                    const endHeartY = centerY - (heartSize * (4 / 16));

                    // ハートの終着点から、最終ターゲット座標（440, 1200）までスーッと移動
                    mouse.x = endHeartX * (1 - easeOutQuad) + goalX * easeOutQuad;
                    mouse.y = endHeartY * (1 - easeOutQuad) + goalY * easeOutQuad;

                    tink.style.left = mouse.x + 'px';
                    tink.style.top = mouse.y + 'px';

                } else {
                    // すべての自動飛行が終了、自由操作へ
                    isAutoFlying = false;
                    mouse.x = goalX;
                    mouse.y = goalY;
                    tink.style.left = goalX + 'px';
                    tink.style.top = goalY + 'px';
                }
            }

            let targetX = mouse.x;
            let targetY = mouse.y;

            dustParticles.forEach((dust) => {
                const speed = isAutoFlying ? 0.25 : 0.22;
                dust.x += (targetX - dust.x) * speed; 
                dust.y += (targetY - dust.y) * speed;

                dust.element.style.left = dust.x + 'px';
                dust.element.style.top = dust.y + 'px';

                targetX = dust.x;
                targetY = dust.y;
            });

            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    </script>
</body>
</html>
