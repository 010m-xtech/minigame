<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>速達生クイズ Level.2</title>
  <!-- Tailwind CSS の読み込み -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React と ReactDOM の読み込み -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel (ブラウザ上でReactコードを変換するためのツール) の読み込み -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- アイコンコンポーネント (エラーを防ぐためSVGで直接定義) ---
    const Beer = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 11h1.2a3 3 0 0 1 0 6H17"></path><path d="M9 7v10a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2V7"></path><path d="M7 7h10v.01"></path><path d="M6 7c0-2.2 2-4 5-4h2c3 0 5 1.8 5 4"></path></svg>
    );
    const CheckCircle2 = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="m9 12 2 2 4-4"></path></svg>
    );
    const XCircle = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="m15 9-6 6"></path><path d="m9 9 6 6"></path></svg>
    );
    const ArrowRight = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
    );
    const Trophy = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>
    );
    const PartyPopper = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5.8 11.3 2 22l10.7-3.79"></path><path d="M4 3h.01"></path><path d="M22 8h.01"></path><path d="M15 2h.01"></path><path d="M22 20h.01"></path><path d="m22 2-2.24.75a2.9 2.9 0 0 0-1.96 3.12v0c.1.86-.57 1.63-1.45 1.63h-.38c-.86 0-1.6.6-1.76 1.44L14 10"></path><path d="m22 13-.82-.33c-.86-.34-1.82.2-1.98 1.11v0c-.11.7-.72 1.22-1.43 1.22H17"></path><path d="m11 2 .33.82c.34.86-.2 1.82-1.11 1.98v0C9.52 4.9 9 5.52 9 6.23V7"></path><path d="M11 13c1.93 1.93 2.83 4.17 2 5-.83.83-3.07-.07-5-2-1.93-1.93-2.83-4.17-2-5 .83-.83 3.07.07 5 2Z"></path></svg>
    );

    // --- クイズデータ (Level.2) ---
    const questions = [
      {
        question: "「四原則」の「適正ガス圧」において、ビールの温度に合わせて炭酸ガス圧を調整しますが、そのビール温度の測定には何を使用するでしょうか？",
        options: ["A. デジタル温度計", "B. ガス圧チェックシート", "C. 赤外線センサー", "D. 感温シール"],
        answerIndex: 1, // B. ガス圧チェックシート
        explanation: "四原則の「適正ガス圧」では、ビールの温度に合わせて炭酸ガス圧を調整し、その際のビール温度の測定にはチェックシートを使用します。"
      },
      {
        question: "生ビールを注いだグラスの内側に「小さな気泡」がたくさん張り付いていることがあります。これは一般的にどのような状態を意味しているでしょう？",
        options: [
          "A. グラスが非常によく冷えている証拠である", 
          "B. グラスの洗浄不足で、油分やホコリなどの汚れが残っている", 
          "C. 炭酸ガスがしっかりとビールに溶け込んでいる良い状態である", 
          "D. 強炭酸で新鮮な状態である"
        ],
        answerIndex: 1, // B. グラスの洗浄不足で〜
        explanation: "グラスの内側に気泡がつくのは、汚れが原因であるとされています。"
      },
      {
        question: "生ビールを注ぐ際、液体と泡の黄金比率（見た目も美しく、美味しさを保てる比率）は一般的にどれくらいと言われているでしょう？",
        options: ["A. 液体7：泡3", "B. 液体6：泡4", "C. 泡7：液体3", "D. 泡5：液体5"],
        answerIndex: 0, // A. 液体7：泡3
        explanation: "一般的なビールの黄金比率は「液体7：泡3」と言われています。見た目も美しく、美味しさを保てる比率です。"
      },
      {
        question: "生ビールの「泡」が持つ、美味しさを守るための重要な役割として間違っているものはどれでしょう？（※間違っているものをすべて選んで解答してください）",
        options: [
          "A. 炭酸ガスが外に逃げて気抜けするのを防ぐ役割", 
          "B. ビールが空気に触れて酸化するのを防ぐ「フタ」の役割", 
          "C. ビールのアルコール度数を下げる役割", 
          "D. 役割などない"
        ],
        answerIndex: [2, 3], // C, D 複数正解に対応
        isMultiSelect: true, // 複数選択フラグを追加
        explanation: "泡にアルコール度数を下げる役割はなく、また「役割がない」というのも間違いです。泡には炭酸を閉じ込め、酸化を防ぐ大切なフタの役割があります。"
      }
    ];

    function App() {
      const [gameState, setGameState] = useState('start'); // 'start', 'playing', 'result'
      const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [showExplanation, setShowExplanation] = useState(false);
      const [selectedAnswers, setSelectedAnswers] = useState([]); // 複数選択に対応するため配列に変更

      const startGame = () => {
        setGameState('playing');
        setCurrentQuestionIndex(0);
        setScore(0);
        setShowExplanation(false);
        setSelectedAnswers([]);
      };

      const handleOptionClick = (index) => {
        if (showExplanation) return;
        
        const currentQ = questions[currentQuestionIndex];
        if (currentQ.isMultiSelect) {
          // 複数選択問題の場合、選択状態をトグルする
          if (selectedAnswers.includes(index)) {
            setSelectedAnswers(selectedAnswers.filter(i => i !== index));
          } else {
            setSelectedAnswers([...selectedAnswers, index]);
          }
        } else {
          // 単一選択問題の場合、即座に解答を送信する
          setSelectedAnswers([index]);
          submitAnswer([index]);
        }
      };

      const submitAnswer = (answersToSubmit = selectedAnswers) => {
        setShowExplanation(true);
        const currentQ = questions[currentQuestionIndex];
        const correctAns = currentQ.answerIndex;
        
        let isCorrect = false;
        if (currentQ.isMultiSelect) {
          // 全て正解を選べているかチェック
          isCorrect = answersToSubmit.length === correctAns.length && answersToSubmit.every(val => correctAns.includes(val));
        } else {
          isCorrect = answersToSubmit[0] === correctAns;
        }
        
        if (isCorrect) {
          setScore(score + 1);
        }
      };

      const nextQuestion = () => {
        if (currentQuestionIndex < questions.length - 1) {
          setCurrentQuestionIndex(currentQuestionIndex + 1);
          setShowExplanation(false);
          setSelectedAnswers([]);
        } else {
          setGameState('result');
        }
      };

      // 全体としての正解/不正解を判定する関数
      const isCurrentQuestionCorrect = () => {
        const currentQ = questions[currentQuestionIndex];
        const correctAns = currentQ.answerIndex;
        if (currentQ.isMultiSelect) {
          return selectedAnswers.length === correctAns.length && selectedAnswers.every(val => correctAns.includes(val));
        } else {
          return selectedAnswers[0] === correctAns;
        }
      };

      // 状態に応じた全体の背景クラス
      const containerClass = gameState === 'start'
        ? "min-h-screen bg-gradient-to-br from-gray-900 via-black to-gray-800 font-sans relative overflow-hidden flex items-center justify-center p-4 transition-colors duration-700"
        : "min-h-screen bg-gradient-to-b from-yellow-300 via-amber-400 to-amber-500 font-sans text-gray-800 relative overflow-hidden flex items-center justify-center p-4 transition-colors duration-700";

      // ビールの泡風のデザインコンポーネント
      const BeerFoam = () => (
        <div className="absolute top-0 left-0 w-full z-0 overflow-hidden h-32 pointer-events-none">
          <div className="absolute -top-4 -left-4 w-32 h-32 bg-white rounded-full opacity-90 mix-blend-overlay"></div>
          <div className="absolute -top-10 left-10 w-40 h-40 bg-white rounded-full opacity-95 mix-blend-overlay"></div>
          <div className="absolute -top-2 left-24 w-28 h-28 bg-white rounded-full opacity-80 mix-blend-overlay"></div>
          <div className="absolute -top-6 left-1/3 w-36 h-36 bg-white rounded-full opacity-90 mix-blend-overlay -translate-x-1/2"></div>
          <div className="absolute -top-12 left-1/2 w-48 h-48 bg-white rounded-full opacity-95 mix-blend-overlay -translate-x-1/2"></div>
          <div className="absolute top-2 left-2/3 w-24 h-24 bg-white rounded-full opacity-70 mix-blend-overlay -translate-x-1/2"></div>
          <div className="absolute -top-8 right-32 w-36 h-36 bg-white rounded-full opacity-85 mix-blend-overlay"></div>
          <div className="absolute -top-10 right-16 w-40 h-40 bg-white rounded-full opacity-90 mix-blend-overlay"></div>
          <div className="absolute top-0 right-8 w-20 h-20 bg-white rounded-full opacity-80 mix-blend-overlay"></div>
          <div className="absolute -top-4 -right-4 w-32 h-32 bg-white rounded-full opacity-95 mix-blend-overlay"></div>
        </div>
      );

      return (
        <div className={containerClass}>
          {/* スタート画面以外でビールの泡を表示 */}
          {gameState !== 'start' && <BeerFoam />}

          <div className="relative z-10 w-full max-w-md mx-auto">
            
            {/* === スタート画面 === */}
            {gameState === 'start' && (
              <div className="bg-zinc-900/90 p-8 rounded-[2rem] shadow-2xl border border-zinc-700 text-center transform transition-all backdrop-blur-sm">
                <div className="flex justify-center mb-6">
                  <div className="bg-gradient-to-br from-amber-400 to-amber-600 p-4 rounded-full shadow-[0_0_20px_rgba(245,158,11,0.3)]">
                    <Beer size={64} className="text-white" />
                  </div>
                </div>
                <p className="text-lg font-bold text-gray-300 mb-4 tracking-tight">QRを読み込んでしまったあなた、</p>
                <p className="text-2xl font-extrabold text-amber-500 mb-2">突然ですが....</p>
                <p className="text-4xl font-black text-amber-500 mb-2 drop-shadow-[0_2px_15px_rgba(245,158,11,0.4)]">問題です！！</p>
                <p className="text-2xl font-black text-amber-400 mb-8 tracking-widest border-b-2 border-amber-500/50 inline-block pb-1">Level.2</p>
                
                <button 
                  onClick={startGame}
                  className="w-full py-4 bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 text-white text-xl font-bold rounded-2xl shadow-[0_0_15px_rgba(245,158,11,0.3)] transition-all transform hover:scale-105 flex items-center justify-center gap-2"
                >
                  <Beer size={24} /> クイズに挑戦する！
                </button>
              </div>
            )}

            {/* === プレイ画面 === */}
            {gameState === 'playing' && (
              <div className="bg-white/95 rounded-[2rem] p-6 shadow-2xl border-2 border-yellow-200">
                <div className="flex items-center justify-between mb-6">
                  <span className="bg-amber-500 text-white px-4 py-1.5 rounded-full text-sm font-bold shadow">
                    Q {currentQuestionIndex + 1} / {questions.length}
                  </span>
                  <span className="text-amber-600 font-bold text-sm">
                    速達生クイズ Level.2
                  </span>
                </div>
                
                <h2 className="text-xl font-bold text-gray-800 mb-6 leading-relaxed">
                  {questions[currentQuestionIndex].question}
                </h2>
                
                <div className="space-y-3">
                  {questions[currentQuestionIndex].options.map((option, index) => {
                    const currentQ = questions[currentQuestionIndex];
                    const correctAns = currentQ.answerIndex;
                    const isCorrectOption = Array.isArray(correctAns) ? correctAns.includes(index) : index === correctAns;
                    const isSelected = selectedAnswers.includes(index);
                    
                    let buttonStyle = 'bg-white border-gray-200 hover:border-amber-400 hover:bg-amber-50 text-gray-700';
                    
                    if (showExplanation) {
                      if (isSelected && isCorrectOption) {
                        buttonStyle = 'bg-green-100 border-green-500 text-green-800 shadow-inner';
                      } else if (isSelected && !isCorrectOption) {
                        buttonStyle = 'bg-red-100 border-red-400 text-red-800';
                      } else if (isCorrectOption) {
                        buttonStyle = 'bg-green-50 border-green-300 text-green-700 opacity-80'; // 選んでないけど正解だったもの
                      } else {
                        buttonStyle = 'bg-white border-gray-200 text-gray-400 opacity-60';
                      }
                    } else if (isSelected) {
                       buttonStyle = 'bg-amber-100 border-amber-500 text-amber-900 shadow-inner';
                    }

                    return (
                      <button
                        key={index}
                        onClick={() => handleOptionClick(index)}
                        disabled={showExplanation}
                        className={`w-full text-left p-4 rounded-xl border-2 font-bold transition-all ${buttonStyle}`}
                      >
                        <div className="flex items-center justify-between">
                          <span>{option}</span>
                          {/* 複数選択問題のときはチェックボックス風のUIを表示 */}
                          {!showExplanation && currentQ.isMultiSelect && (
                             <div className={`w-6 h-6 rounded flex items-center justify-center shrink-0 ml-2 border-2 ${isSelected ? 'bg-amber-500 border-amber-500' : 'border-gray-300'}`}>
                               {isSelected && <CheckCircle2 size={16} className="text-white" />}
                             </div>
                          )}
                          {showExplanation && isCorrectOption && <CheckCircle2 className="text-green-600 shrink-0 ml-2" size={20} />}
                          {showExplanation && isSelected && !isCorrectOption && <XCircle className="text-red-500 shrink-0 ml-2" size={20} />}
                        </div>
                      </button>
                    );
                  })}
                </div>

                {/* 複数選択時の回答ボタン */}
                {!showExplanation && questions[currentQuestionIndex].isMultiSelect && (
                   <button
                     onClick={() => submitAnswer()}
                     disabled={selectedAnswers.length === 0}
                     className={`mt-6 w-full py-4 font-bold rounded-xl shadow-lg flex items-center justify-center gap-2 transition-transform ${selectedAnswers.length > 0 ? 'bg-amber-500 hover:bg-amber-600 text-white active:scale-95' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}
                   >
                     解答する
                   </button>
                )}

                {/* 解説エリア */}
                {showExplanation && (
                  <div className="mt-6 animate-[fadeIn_0.5s_ease-out]">
                    <div className={`p-5 rounded-2xl flex items-start gap-3 border ${
                      isCurrentQuestionCorrect()
                        ? 'bg-green-50 border-green-200 text-green-900' 
                        : 'bg-red-50 border-red-200 text-red-900'
                    }`}>
                      {isCurrentQuestionCorrect()
                        ? <CheckCircle2 className="shrink-0 mt-0.5 text-green-600" /> 
                        : <XCircle className="shrink-0 mt-0.5 text-red-500" />
                      }
                      <div>
                        <p className="font-extrabold text-lg mb-2">
                          {isCurrentQuestionCorrect() ? '大正解！' : '残念！'}
                        </p>
                        <p className="text-sm leading-relaxed font-medium">
                          {questions[currentQuestionIndex].explanation}
                        </p>
                      </div>
                    </div>
                    
                    <button 
                      onClick={nextQuestion} 
                      className="mt-6 w-full py-4 bg-gray-800 hover:bg-black text-white font-bold rounded-xl shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95"
                    >
                      {currentQuestionIndex < questions.length - 1 ? '次の問題へ' : '結果を見る'} <ArrowRight size={20} />
                    </button>
                  </div>
                )}
              </div>
            )}

            {/* === 結果画面 === */}
            {gameState === 'result' && (
              <div className="bg-white/95 p-8 rounded-[2rem] shadow-2xl border-4 border-yellow-200 text-center">
                <div className="flex justify-center mb-4">
                  {score === questions.length ? (
                    <div className="bg-yellow-100 p-4 rounded-full relative">
                      <PartyPopper size={64} className="text-yellow-600" />
                      <Trophy size={32} className="text-yellow-500 absolute -bottom-2 -right-2" />
                    </div>
                  ) : (
                    <div className="bg-amber-100 p-4 rounded-full">
                      <Beer size={64} className="text-amber-500" />
                    </div>
                  )}
                </div>
                
                <h2 className="text-2xl font-bold text-gray-800 mb-2">クイズ結果</h2>
                <div className="text-5xl font-black text-amber-500 mb-6 flex justify-center items-baseline gap-2">
                  {score} <span className="text-2xl text-gray-600 font-bold">/ {questions.length}問正解</span>
                </div>

                <div className="bg-gray-100 rounded-xl p-4 mb-8">
                  <p className="font-bold text-gray-700 leading-relaxed">
                    {score === questions.length && "パーフェクト！あなたは真の速達生マスターです！乾杯！"}
                    {score >= 2 && score < questions.length && "惜しい！もう少し！美味しいビールが待ってますよ！"}
                    {score < 2 && "まだまだこれから！お店で美味しい速達生を飲んで復習しよう！"}
                  </p>
                </div>
              </div>
            )}
            
          </div>
        </div>
      );
    }

    // アプリの描画
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
