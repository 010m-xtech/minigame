<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ハイボールチンチロリン</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    
    html, body {
      width: 100%;
      height: 100%;
      height: 100dvh;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      background-image: url('backscreen.jpg');
      background-position: center center;
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      font-weight: bold;
      color: #fff;
      touch-action: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start; /* 上から順番にバランスよく配置 */
      padding-top: 5dvh; /* 【修正】タイトルを少し下に下げるための余白 */
    }
    
    /* 3Dサイコロエリアのサイズを微調整 */
    #gameCanvas { display: block; width: 100%; height: 35vh; background: transparent; }
    
    #ui-container {
      width: 100%;
      max-width: 450px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      z-index: 10;
      padding: 0 15px;
    }
    
    /* 【修正】タイトルエリアに半透明の黒帯を敷いて、背景が派手でもクッキリ見えるように */
    #title-box {
      width: 100%;
      background: rgba(0, 0, 0, 0.55);
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 5px;
      border: 1px solid rgba(255, 214, 0, 0.3);
    }

    #game-title {
      font-size: 32px;
      color: #ffd600;
      text-shadow: 1px 1px 3px #000;
      letter-spacing: 1px;
    }

    /* 【修正】結果表示エリアも黒帯で囲んで視認性を最優先 */
    #result-box {
      width: 100%;
      background: rgba(0, 0, 0, 0.7);
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      border: 2px solid #ffd600;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    #result-display {
      font-size: 26px;
      min-height: 40px;
      line-height: 1.3;
      color: #fff;
    }

    #dice-values {
      font-size: 16px;
      color: #ffeb3b;
      margin-top: 4px;
    }
    
    /* ボタンを押しやすい位置に調整 */
    #btn-container {
      margin-top: auto; /* 画面の一番下側に自動配置 */
      margin-bottom: 4dvh; /* 下に切れ込まない安全マージン */
      z-index: 10;
      width: 90%;
      max-width: 400px;
    }

    .btn-roll {
      width: 100%;
      background: #e67e22; /* お祭りオレンジ */
      color: #fff;
      border: 4px solid #ffd600;
      padding: 14px 0;
      font-size: 24px;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.5);
      transition: all 0.1s;
      text-align: center;
    }
    .btn-roll:disabled {
      background: #4b5563 !important;
      color: #9ca3af !important;
      border-color: #6b7280 !important;
      box-shadow: none !important;
      cursor: not-allowed !important;
      transform: none !important;
      opacity: 0.9;
    }
    .btn-roll:not(:disabled):active { transform: scale(0.96); }

    /* 【修正】ルール早見表パネルの位置をサイコロのすぐ下に引っ越し */
    #rule-panel {
      margin-top: 5px;
      background: rgba(0, 0, 0, 0.75); /* 文字がブレないように少し濃いめの半透明 */
      border: 2px solid #ffd600;
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 13px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }
    .rule-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 4px; }
    .rule-item:last-child { border-bottom: none; padding-bottom: 0; }
    .rule-label { color: #ffeb3b; }
    .rule-prize { color: #fff; font-size: 14px; text-shadow: 1px 1px 1px #000; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <div id="ui-container">
    <div id="title-box">
      <div id="game-title">ハイボールチンチロリン</div>
    </div>
    
    <div id="result-box">
      <div id="result-display">一回勝負！サイコロを振ってください</div>
      <div id="dice-values">・ ・ ・</div>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div id="ui-container">
    <div id="rule-panel">
      <div class="rule-item"><span class="rule-label">🎲 ゾロ目 (数字が揃う)</span><span class="rule-prize" id="lbl-zoro">-</span></div>
      <div class="rule-item"><span class="rule-label">🎲 合計が【奇数】</span><span class="rule-prize" id="lbl-kisu">-</span></div>
      <div class="rule-item"><span class="rule-label">🎲 合計が【偶数】</span><span class="rule-prize" id="lbl-gusu">-</span></div>
      <div class="rule-item"><span class="rule-label">🎲 その他</span><span class="rule-prize" id="lbl-other">通常料金</span></div>
    </div>
  </div>

  <div id="btn-container">
    <button class="btn-roll" id="btn-roll">サイコロを振る！</button>
  </div>

  <script>
    const CONFIG = {
      TITLE: "ハイボールチンチロリン", 
      PRIZE_ZORO: "通常サイズ 【無料】!!",   
      PRIZE_KISU: "通常サイズ 【半額】!",    
      PRIZE_GUSU: "強制【メガジョッキ】倍額", 
      PRIZE_OTHER: "通常料金（そのまま）"     
    };

    document.getElementById('game-title').innerText = CONFIG.TITLE;
    document.title = CONFIG.TITLE;
    document.getElementById('lbl-zoro').innerText = CONFIG.PRIZE_ZORO;
    document.getElementById('lbl-kisu').innerText = CONFIG.PRIZE_KISU;
    document.getElementById('lbl-gusu').innerText = CONFIG.PRIZE_GUSU;
    document.getElementById('lbl-other').innerText = CONFIG.PRIZE_OTHER;

    // 🔒 不正リロード＆再読み込みブロック処理
    window.addEventListener('beforeunload', (e) => {
      e.preventDefault(); e.returnValue = 'データが消失します。'; 
    });
    window.addEventListener('keydown', (e) => {
      if (e.key === 'F5' || (e.ctrlKey && e.key === 'r') || (e.metaKey && e.key === 'r')) {
        e.preventDefault(); return false;
      }
    });
    document.addEventListener('contextmenu', (e) => { e.preventDefault(); });

    // --- 音響システム ---
    class SynthAudio {
      constructor() { this.ctx = null; }
      init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      play(freq, endFreq, duration, type = 'triangle', vol = 0.1) {
        if(!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type; osc.connect(gain); gain.connect(this.ctx.destination);
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(endFreq, this.ctx.currentTime + duration);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
        osc.start(); osc.stop(this.ctx.currentTime + duration);
      }
      playClick() { this.play(900, 400, 0.04, 'triangle', 0.08); } 
      playStop() { this.play(160, 80, 0.1, 'sine', 0.2); } 
      playWin() { 
        const notes = [587, 659, 784, 880, 988, 1174]; 
        notes.forEach((f, i) => {
          setTimeout(() => this.play(f, f, 0.12, 'square', 0.03), i * 70);
        });
      }
    }
    const audio = new SynthAudio();
    document.body.addEventListener('pointerdown', () => audio.init(), { once: true });

    // --- Three.js セットアップ ---
    const canvas = document.getElementById('gameCanvas');
    const scene = new THREE.Scene();
    
    // パースを見やすさ重視で微調整
    const camera = new THREE.PerspectiveCamera(36, window.innerWidth / (window.innerHeight * 0.35), 0.1, 1000);
    camera.position.set(0, 0, 6.2);
    camera.lookAt(0, 0, 0);
    
    const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight * 0.35);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.0); 
    scene.add(ambientLight);

    // --- 通常ドットサイコロテクスチャ ---
    const diceNumbers = [3, 4, 1, 6, 2, 5]; 
    const dotPositions = {
      1: [[64, 64]],
      2: [[34, 34], [94, 94]],
      3: [[34, 34], [64, 64], [94, 94]],
      4: [[34, 34], [34, 94], [94, 34], [94, 94]],
      5: [[34, 34], [34, 94], [64, 64], [94, 34], [94, 94]],
      6: [[34, 34], [34, 64], [34, 94], [94, 34], [94, 64], [94, 94]]
    };

    function createDiceMaterials() {
      const mats = [];
      diceNumbers.forEach(num => {
        const c = document.createElement('canvas');
        c.width = 128; c.height = 128;
        const ctx = c.getContext('2d');
        
        ctx.fillStyle = '#fffdfa';
        ctx.fillRect(0, 0, 128, 128);
        ctx.strokeStyle = '#f3e6d0';
        ctx.lineWidth = 2;
        ctx.strokeRect(4, 4, 120, 120);

        const dots = dotPositions[num];
        ctx.fillStyle = num === 1 ? '#d35400' : '#2c3e50'; 
        dots.forEach(pos => {
          ctx.beginPath();
          const radius = num === 1 ? 22 : 11;
          ctx.arc(pos[0], pos[1], radius, 0, Math.PI * 2);
          ctx.fill();
        });
        
        const tex = new THREE.CanvasTexture(c);
        mats.push(new THREE.MeshStandardMaterial({ map: tex, roughness: 0.3 }));
      });
      return mats;
    }
    const diceMaterials = createDiceMaterials();

    const faceRotations = {
      1: new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), Math.PI / 2),
      2: new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), 0),
      3: new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), -Math.PI / 2),
      4: new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), Math.PI / 2),
      5: new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), Math.PI),
      6: new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), -Math.PI / 2)
    };

    const diceMeshes = [];
    const geo = new THREE.BoxGeometry(0.85, 0.85, 0.85);

    for (let i = 0; i < 3; i++) {
      const mesh = new THREE.Mesh(geo, diceMaterials);
      scene.add(mesh);
      diceMeshes.push({
        mesh: mesh,
        angle: i * (Math.PI * 2 / 3),
        targetQuat: new THREE.Quaternion(),
        rotSpeed: new THREE.Vector3()
      });
    }

    function judgeChinchiroRule(dice) {
      const [d1, d2, d3] = dice;
      const total = d1 + d2 + d3;

      if (d1 === d2 && d2 === d3) {
        return { name: `ゾロ目！🎉\n${CONFIG.PRIZE_ZORO}`, isWin: true };
      }
      
      if (total % 2 !== 0) {
        return { name: `合計 ${total} (奇数)！👍\n${CONFIG.PRIZE_KISU}`, isWin: true };
      } else {
        return { name: `合計 ${total} (偶数)！😲\n${CONFIG.PRIZE_GUSU}`, isWin: false };
      }
    }

    const rollButton = document.getElementById('btn-roll');
    const resultDisplay = document.getElementById('result-display');
    const diceValuesDisplay = document.getElementById('dice-values');

    let rollTimeline = 0;
    let finalResults = [1, 2, 3];

    function rollDice() {
      if (rollTimeline > 0) return; 
      
      rollButton.disabled = true;
      resultDisplay.innerText = "運命のダイスロール！";
      resultDisplay.style.color = "#ffeb3b";
      diceValuesDisplay.innerText = "ガラガラガラ……";

      finalResults = [
        Math.floor(Math.random() * 6) + 1,
        Math.floor(Math.random() * 6) + 1,
        Math.floor(Math.random() * 6) + 1
      ];

      diceMeshes.forEach((dice) => {
        dice.rotSpeed.set(
          5 + Math.random() * 4,
          5 + Math.random() * 4,
          5 + Math.random() * 4
        );
        dice.targetQuat.copy(faceRotations[finalResults[index = diceMeshes.indexOf(dice)]]);
      });

      rollTimeline = 2.0; 
    }

    rollButton.addEventListener('click', () => {
      audio.init();
      rollDice();
    });

    const clock = new THREE.Clock();

    renderer.setAnimationLoop(() => {
      const dt = clock.getDelta();

      if (rollTimeline > 0) {
        rollTimeline -= dt;

        diceMeshes.forEach((dice, index) => {
          if (rollTimeline > 0.5) {
            // イラスト中央の「白い円形スペース」の枠内にぴったり合わせて綺麗にスピン
            dice.angle += dt * 8.0;
            let radius = 0.45 + rollTimeline * 0.25; 
            let px = Math.cos(dice.angle + index) * radius;
            let pz = Math.sin(dice.angle + index) * radius;
            let py = -0.1 + (Math.pow(px,2) + Math.pow(pz,2)) * 0.1; 
            
            dice.mesh.position.set(px, py, pz);

            dice.mesh.rotateX(dice.rotSpeed.x * dt);
            dice.mesh.rotateY(dice.rotSpeed.y * dt);
            dice.mesh.rotateZ(dice.rotSpeed.z * dt);
            
            if (Math.random() < 0.08) audio.playClick(); 
          } else {
            // イラスト中央（Y: -0.15）に綺麗に横一列に吸着
            let targetX = (index - 1) * 0.95; 
            dice.mesh.position.x = THREE.MathUtils.lerp(dice.mesh.position.x, targetX, 0.15);
            dice.mesh.position.y = THREE.MathUtils.lerp(dice.mesh.position.y, -0.15, 0.15); 
            dice.mesh.position.z = THREE.MathUtils.lerp(dice.mesh.position.z, 0, 0.15);
            
            dice.mesh.quaternion.slerp(dice.targetQuat, 0.3);
          }
        });

        if (rollTimeline <= 0) {
          rollTimeline = 0;
          
          diceMeshes.forEach((dice, index) => {
            dice.mesh.position.set((index - 1) * 0.95, -0.15, 0);
            dice.mesh.quaternion.copy(dice.targetQuat); 
          });

          audio.playStop();

          const result = judgeChinchiroRule(finalResults);
          diceValuesDisplay.innerText = `出目: ［ ${finalResults[0]} ］［ ${finalResults[1]} ］［ ${finalResults[2]} ］`;
          resultDisplay.innerText = result.name;
          
          if (result.isWin) {
            resultDisplay.style.color = "#39ff14"; 
            audio.playWin();
          } else {
            resultDisplay.style.color = "#ff1744"; 
          }

          rollButton.innerText = "また挑戦してね";
          rollButton.disabled = true;
        }
      } else {
        diceMeshes.forEach((dice, index) => {
          dice.mesh.position.set((index - 1) * 0.95, -0.15, 0);
        });
      }

      renderer.render(scene, camera);
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / (window.innerHeight * 0.35);
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight * 0.35);
    });
  </script>
</body>
</html>
