    * { margin: 0; padding: 0; box-sizing: border-box; }

    #game-container {
      position: relative;
      width: 100%;
      height: 100vh;
      background: #000;
      display: flex;
      justify-content: center;

      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      pointer-events: auto;
    }

    .clay-panel {
      background: #fff;
      border-radius: 30px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 
        inset 3px 3px 10px rgba(255,255,255,0.9),
        inset -4px -4px 10px rgba(0,0,0,0.05),
        5px 5px 20px rgba(0,0,0,0.1);
      width: 85%;
      max-width: 350px;
    }

    h1 {
      color: #ffb6d5;
      text-shadow: 2px 2px 0px #fff;
      margin-bottom: 20px;
      font-size: 32px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: none;
      border-radius: 20px;
      background: #f9f9f9;
      font-size: 18px;
      text-align: center;
      color: #555;
      outline: none;
      box-shadow: 
        inset 3px 3px 6px rgba(0,0,0,0.1),
        inset -3px -3px 6px rgba(255,255,255,0.8);
    }

    .cross {
      color: #a8e7ff;
      font-size: 24px;
      font-weight: bold;
      margin: 5px 0;
    }

    button {
      margin-top: 20px;
      padding: 15px 40px;
      border: none;
      border-radius: 25px;
      background: #ffb6d5;
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 
        inset 3px 3px 8px rgba(255,255,255,0.5),
        inset -3px -3px 8px rgba(0,0,0,0.1),
        4px 4px 10px rgba(0,0,0,0.15);
      transition: transform 0.1s;
      pointer-events: auto;
    }

    button:active {
      transform: scale(0.95);
      box-shadow: 
        inset 4px 4px 10px rgba(0,0,0,0.2),
        inset -2px -2px 5px rgba(255,255,255,0.5);
    }

    #result-msg {
      font-size: 24px;
      font-weight: bold;
      color: #ffb6d5;
      text-shadow: 2px 2px 0px #fff;
      margin: 0;
      text-align: center;
      line-height: 1.4;
    }

    #loading-screen {
      position: absolute;
      inset: 0;
      z-index: 2000;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #ffb6d5;
      font-size: 24px;
      font-weight: bold;

  <script>
    // Translation System
    const uiPayload = JSON.parse(document.getElementById('dc-ui-texts').textContent);
    const sourceLang = uiPayload.sourceLang || 'en';
    const uiTexts = uiPayload.texts || {};
    const savedLang = (localStorage.getItem('dreamcore_lang') || '').slice(0, 2);
    const browserLang = (navigator.language || '').slice(0, 2);
    const currentLang = uiTexts[savedLang] ? savedLang : (uiTexts[browserLang] ? browserLang : sourceLang);
    function t(key, vars) {
      let s = (uiTexts[currentLang] && uiTexts[currentLang][key]) || (uiTexts[sourceLang] && uiTexts[sourceLang][key]) || key;
      if (vars) Object.keys(vars).forEach((k) => { s = s.replaceAll('{' + k + '}', String(vars[k])); });
      return s;
    }

    // Audio System
    class SynthAudio {
      constructor() { this.ctx = null; }
      init() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (this.ctx.state === 'suspended') this.ctx.resume();
      }
      play(freq, endFreq, duration, type = 'sine', vol = 0.2) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(endFreq, this.ctx.currentTime + duration);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
      }
      playPop() { this.play(600, 800, 0.1, 'sine', 0.2); }
      playBeat(pitch = 100) { this.play(pitch, pitch * 0.8, 0.2, 'sine', 0.4); }
      playFanfare() {
        [523, 659, 784].forEach((f, i) => {
          setTimeout(() => this.play(f, f, 0.15, 'square', 0.2), i * 150);
        });
        setTimeout(() => this.play(1046, 1046, 0.5, 'square', 0.2), 450);
      }
      playSparkle() {
        [800, 1200, 1600].forEach((f, i) => {
          setTimeout(() => this.play(f, f*1.2, 0.1, 'sine', 0.1), i * 50);
        });
      }
    }
    const audio = new SynthAudio();
    document.addEventListener('pointerdown', () => audio.init(), { once: true });

        assets.cloud = p.loadImage('cloud.png', null, () => assets.cloud = p.loadImage('/user-assets/d620050e-2d2f-4386-8a27-8e85a1edc81d/cloud_
