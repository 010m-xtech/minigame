<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>オーダー・クエスト 〜伝説のメニューを召喚せよ〜</title>
    <style>
      :root {
        --bg-color: #1a1614;
        --primary: #d4af37;
        --primary-dark: #8a6e1e;
        --accent: #c0392b;
        --text-color: #f3e5d8;
        --panel-bg: #2c241b;
        --border-style: 4px solid var(--primary);
      }

      * {
        box-sizing: border-box;
        user-select: none;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: #000;
        font-family:
          "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        color: var(--text-color);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }

      #game-container {
        width: 100%;
        height: 100%;
        max-width: 1920px;
        max-height: 980px;
        background: var(--bg-color);
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-image: radial-gradient(circle at center, #3e3025 0%, #1a1614 80%);
      }

      .screen {
        width: 90%;
        height: 90%;
        max-width: 1000px;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        position: absolute;
        z-index: 10;
      }

      .screen.active {
        display: flex;
        animation: fadeIn 0.5s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h1,
      h2,
      h3 {
        color: var(--primary);
        text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        margin: 0 0 20px 0;
      }

      h1 {
        font-size: 3rem;
        border-bottom: 2px solid var(--primary);
        padding-bottom: 10px;
      }

      p {
        font-size: 1.2rem;
        line-height: 1.6;
        margin-bottom: 20px;
      }

      .btn {
        background: var(--panel-bg);
        color: var(--primary);
        border: var(--border-style);
        padding: 15px 40px;
        font-size: 1.5rem;
        cursor: pointer;
        margin: 10px;
        transition: all 0.2s;
        font-weight: bold;
        box-shadow: 0 4px 0 var(--primary-dark);
      }

      .btn:hover {
        transform: translateY(2px);
        box-shadow: 0 2px 0 var(--primary-dark);
        background: #3e3326;
        color: #fff;
      }

      .btn:active {
        transform: translateY(4px);
        box-shadow: none;
      }

      .btn-large {
        padding: 20px 80px;
        font-size: 2rem;
      }

      .form-group {
        margin: 15px 0;
        text-align: left;
        width: 80%;
        max-width: 600px;
      }

      .question-label {
        display: block;
        margin-bottom: 10px;
        color: var(--primary);
        font-size: 1.1rem;
      }

      .options-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 10px;
      }

      .option-btn {
        background: rgba(0, 0, 0, 0.3);
        border: 2px solid #555;
        color: #ccc;
        padding: 10px;
        cursor: pointer;
        transition: 0.2s;
        text-align: center;
      }

      .option-btn.selected {
        border-color: var(--primary);
        background: rgba(212, 175, 55, 0.2);
        color: #fff;
        box-shadow: inset 0 0 10px var(--primary);
      }

      .card-panel {
        background: var(--panel-bg);
        border: var(--border-style);
        padding: 20px;
        margin: 10px;
        width: 100%;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        position: relative;
      }

      .menu-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(0, 0, 0, 0.2);
        padding: 15px;
        margin-bottom: 10px;
        border: 1px solid #555;
      }

      .menu-icon {
        font-size: 2rem;
        margin-right: 15px;
      }

      .menu-info {
        flex-grow: 1;
        text-align: left;
      }

      .menu-name {
        font-size: 1.2rem;
        color: var(--primary);
        font-weight: bold;
      }

      .menu-desc {
        font-size: 0.9rem;
        color: #aaa;
      }

      .lottery-stage {
        position: relative;
        width: 500px;
        height: 500px;
        margin: 20px auto;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 4rem;
      }

      .dice {
        font-size: 5rem;
        animation: shake 0.5s infinite;
      }
      .chest-shake {
        animation: shake 0.5s infinite;
      }

      @keyframes shake {
        0% {
          transform: rotate(0deg);
        }
        25% {
          transform: rotate(5deg);
        }
        50% {
          transform: rotate(0deg);
        }
        75% {
          transform: rotate(-5deg);
        }
        100% {
          transform: rotate(0deg);
        }
      }

      @keyframes shake-hard {
        0% {
          transform: rotate(0deg) translateY(0);
        }
        25% {
          transform: rotate(15deg) translateY(-10px);
        }
        50% {
          transform: rotate(0deg) translateY(0);
        }
        75% {
          transform: rotate(-15deg) translateY(10px);
        }
        100% {
          transform: rotate(0deg) translateY(0);
        }
      }

      .chest-open {
        animation: bounce 0.6s infinite alternate;
      }

      .fantasy-chest-wrapper {
        position: relative;
        display: inline-block;
      }

      .chest-visual {
        width: 450px;
        max-width: 90vw;
        height: auto;
        position: relative;
        z-index: 2;
        filter: sepia(1) hue-rotate(-50deg) saturate(3) drop-shadow(0 10px 20px rgba(0, 0, 0, 0.6));
        display: block;
        transition: filter 0.2s;
      }

      .chest-glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 175px;
        height: 175px;
        background: radial-gradient(circle, rgba(212, 175, 55, 0.2) 0%, transparent 70%);
        z-index: 1;
      }

      .chest-lock {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 5rem;
        z-index: 10;
        filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.8));
      }

      @keyframes bounce {
        from {
          transform: scale(1);
        }
        to {
          transform: scale(1.1);
        }
      }

      .result-box {
        border: 2px solid var(--primary);
        padding: 30px;
        background: rgba(212, 175, 55, 0.1);
        margin: 20px;
        min-height: 150px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }

      .serial-code {
        font-family: monospace;
        font-size: 2rem;
        color: var(--accent);
        letter-spacing: 5px;
        font-weight: bold;
        border: 2px dashed var(--accent);
        padding: 10px;
        margin-top: 10px;
      }

      .confetti {
        position: absolute;
        width: 10px;
        height: 10px;
        background: var(--primary);
        animation: fall linear forwards;
      }

      @keyframes fall {
        to {
          transform: translateY(100vh) rotate(720deg);
        }
      }

      #toast-container {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .toast {
        background: rgba(0, 0, 0, 0.8);
        color: var(--primary);
        border: 1px solid var(--primary);
        padding: 10px 20px;
        border-radius: 5px;
        animation: slideDown 0.3s;
      }

      @keyframes slideDown {
        from {
          transform: translateY(-20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      @media (max-width: 600px) {
        h1 {
          font-size: 1.8rem;
        }
        .btn {
          padding: 10px 20px;
          font-size: 1rem;
        }
        .menu-card {
          flex-direction: column;
          text-align: center;
        }
        .menu-info {
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="toast-container"></div>

      <div id="screen-start" class="screen active">
        <h1>オーダー・クエスト<br />〜伝説のメニューを召喚せよ〜</h1>
        <p>追加注文＝冒険の準備<br />状態を入力して、最適な供物を見つけよう</p>
        <div style="font-size: 5rem; margin: 20px">🗡️⚔️🛡️</div>
        <button class="btn btn-large" id="btn-start">冒険を始める</button>
      </div>

      <div id="screen-diagnosis" class="screen">
        <h2>冒険者（あなた）の状態診断</h2>

        <div class="form-group">
          <span class="question-label">■ パーティー人数</span>
          <div class="options-grid" id="q-party">
            <div class="option-btn" data-value="1">1名（ソロ）</div>
            <div class="option-btn" data-value="2">2名</div>
            <div class="option-btn" data-value="4">4名（パーティ）</div>
            <div class="option-btn" data-value="8">8名（軍団）</div>
          </div>
        </div>

        <div class="form-group">
          <span class="question-label">■ 胃のHP（満腹度）</span>
          <div class="options-grid" id="q-hp">
            <div class="option-btn" data-value="0">0%（瀕死/限界）</div>
            <div class="option-btn" data-value="30">30%（中ダメージ）</div>
            <div class="option-btn" data-value="70">70%（無傷）</div>
          </div>
        </div>

        <div class="form-group">
          <span class="question-label">■ 好みの属性</span>
          <div class="options-grid" id="q-pref">
            <div class="option-btn" data-value="meat">🥩 肉</div>
            <div class="option-btn" data-value="fresh">🐟 さっぱり</div>
            <div class="option-btn" data-value="spicy">🌶️ 刺激</div>
            <div class="option-btn" data-value="sweet">🍰 甘美</div>
          </div>
        </div>

        <div class="form-group">
          <span class="question-label">■ 現在のムード</span>
          <div class="options-grid" id="q-mood">
            <div class="option-btn" data-value="loud">わいわい（宴）</div>
            <div class="option-btn" data-value="quiet">しっぽり（語り）</div>
            <div class="option-btn" data-value="reward">ご褒美（探求）</div>
          </div>
        </div>

        <button class="btn" id="btn-diagnose" disabled>診断を実行</button>
      </div>

      <div id="screen-summon" class="screen">
        <h2>召喚成功！</h2>
        <p>ギルドからの推奨メニューです</p>
        <div id="menu-list" style="width: 100%; max-width: 500px"></div>
        <button class="btn" id="btn-to-lottery">抽選クエストへ</button>
      </div>

      <div id="screen-lottery" class="screen">
        <h2>宝箱をみつけた</h2>
        <p>鍵のかかった封印を解き、報酬を獲得しよう</p>
        <div class="lottery-stage" id="lottery-display">
          <div class="fantasy-chest-wrapper">
            <div class="chest-glow"></div>
            <img
              src="https://ai-game-builder-r2.willbooster.dev/presets/llm-app-presets/chatgpt/mark/mark_025.png?v=public-r2-1"
              class="chest-visual"
              alt="宝箱"
            />
          </div>
        </div>
        <button class="btn btn-large" id="btn-roll">回す</button>
      </div>

      <div id="screen-result" class="screen">
        <h2 id="result-title">結果発表</h2>
        <div id="result-content" class="result-box"></div>
        <button class="btn" id="btn-restart">ゲームクリア（終了）</button>
      </div>
    </div>

    <script>
      const MENU_DB = [
        {
          id: "m1",
          name: "熟成サーロインステーキ",
          tag: "meat",
          type: "heavy",
          desc: "溶岩石で焼く至高の一撃",
        },
        {
          id: "m2",
          name: "背徳のガーリックバター混ぜそば",
          tag: "spicy",
          type: "heavy",
          desc: "悪魔的な誘惑の麺",
        },
        {
          id: "m3",
          name: "トリュフ香る 黄金のフレンチフライ",
          tag: "fresh",
          type: "snack",
          desc: "旅の供に最適なつまみ",
        },
        {
          id: "m4",
          name: "真鯛のカルパッチョ",
          tag: "fresh",
          type: "snack",
          desc: "柑橘の魔法仕立て",
        },
        {
          id: "m5",
          name: "禁断のフォンダンショコラ",
          tag: "sweet",
          type: "dessert",
          desc: "バニラの吐息と共に",
        },
        {
          id: "m6",
          name: "鉄板焼きおにぎり茶漬け（秘伝の出汁）",
          tag: "fresh",
          type: "light",
          desc: "秘伝の出汁でHP回復",
        },
        {
          id: "m7",
          name: "自家製クラフトジンジャーエール / 氷点下ハイボール",
          tag: "spicy",
          type: "drink",
          desc: "凍てつく孤高い刺激",
        },
      ];

      const REWARDS = [
        {
          type: "tip",
          text: "このステーキは端から食べると焼きたての温度を均一に味わえます。",
        },
        {
          type: "tip",
          text: "店主オリジナルのソースは、隠し味に蜂蜜を使っています。",
        },
        {
          type: "tip",
          text: "冷たいお茶は舌の油を洗い流し、次の一口を美味しくします。",
        },
        {
          type: "tip",
          text: "フライドポテトは熱いうちに塩味を楽しんでください。",
        },
        {
          type: "tip",
          text: "混ぜそばは残り汁まで美味しくお召し上がりいただけます。",
        },
        {
          type: "message",
          text: "ギルドマスター（店主）より：「今日もあなたの冒険に幸あれ！」",
        },
        {
          type: "tip",
          text: "このフォンダンショコラは、スプーンで中央を割るとトロリと溢れ出します。",
        },
        {
          type: "tip",
          text: "当店自慢の茶漬けは、最後のひと粒まで味わってください。",
        },
        {
          type: "message",
          text: "お客様の笑顔が、我々にとって一番の報酬です。",
        },
      ];

      let gameState = {
        party: 0,
        hp: 0,
        pref: "",
        mood: "",
        recommended: [],
        history: [],
      };

      const projectId = window.projectId || "order_quest_default";

      function showToast(msg) {
        const container = document.getElementById("toast-container");
        const el = document.createElement("div");
        el.className = "toast";
        el.textContent = msg;
        container.appendChild(el);
        setTimeout(() => el.remove(), 3000);
      }

      function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
      }

      function saveToStorage() {
        try {
          const currentData = JSON.parse(localStorage.getItem("game_" + projectId) || "[]");
          currentData.push({
            date: new Date().toISOString(),
            state: gameState,
          });
          localStorage.setItem("game_" + projectId, JSON.stringify(currentData));
          console.log("Game saved to localStorage");
        } catch (e) {
          console.error("Storage error:", e);
        }
      }

      function init() {
        document
          .getElementById("btn-start")
          .addEventListener("click", () => switchScreen("diagnosis"));

        const questions = ["party", "hp", "pref", "mood"];
        let answered = 0;

        questions.forEach((q) => {
          const container = document.getElementById("q-" + q);
          container.addEventListener("click", (e) => {
            if (e.target.classList.contains("option-btn")) {
              Array.from(container.children).forEach((c) => c.classList.remove("selected"));
              e.target.classList.add("selected");
              gameState[q] = e.target.getAttribute("data-value");
              console.log(`Input ${q}: ${gameState[q]}`);

              // Enable diagnose button when all questions have been answered
              // (Check for undefined/empty string instead of falsy values because "0" is a valid answer)
              if (
                ["party", "hp", "pref", "mood"].every(
                  (key) => gameState[key] !== undefined && gameState[key] !== "",
                )
              ) {
                document.getElementById("btn-diagnose").disabled = false;
              }

              if (q === "party" && parseInt(gameState.party) > 4) {
                showToast("大人数の宴ですね！");
              }
            }
          });
        });

        document.getElementById("btn-diagnose").addEventListener("click", runDiagnosis);
        document
          .getElementById("btn-to-lottery")
          .addEventListener("click", () => switchScreen("lottery"));
        document.getElementById("btn-roll").addEventListener("click", runLottery);
        document.getElementById("btn-restart").addEventListener("click", () => location.reload());

        window.addEventListener("resize", () => console.log("Viewport resized"));
        console.log("Game initialized. Project ID:", projectId);
      }

      function switchScreen(screenName) {
        document.querySelectorAll(".screen").forEach((s) => s.classList.remove("active"));
        document.getElementById("screen-" + screenName).classList.add("active");
        console.log("Switched to screen:", screenName);
      }

      function runDiagnosis() {
        console.log("Running diagnosis with data:", gameState);

        const hpNum = Number(gameState.hp);
        let scoredMenu = MENU_DB.map((menu) => {
          let score = 0;
          if (gameState.pref === menu.tag) score += 10;

          if (hpNum < 30 && (menu.type === "snack" || menu.type === "dessert")) score += 5;
          if (hpNum > 30 && (menu.type === "heavy" || menu.type === "light")) score += 5;

          if (gameState.mood === "reward" && menu.type === "dessert") score += 8;
          if (gameState.mood === "loud" && menu.type === "heavy") score += 5;

          return { ...menu, score };
        });

        scoredMenu.sort((a, b) => b.score - a.score);

        gameState.recommended = scoredMenu.slice(0, 2);
        console.log("Recommended menus:", gameState.recommended);

        const listEl = document.getElementById("menu-list");
        listEl.innerHTML = "";

        gameState.recommended.forEach((menu) => {
          const div = document.createElement("div");
          div.className = "menu-card";
          let icon = "🍽️";
          if (menu.tag === "meat") icon = "🥩";
          if (menu.tag === "sweet") icon = "🍩";
          if (menu.tag === "fresh") icon = "🐟";
          if (menu.tag === "spicy") icon = "🌶️";

          div.innerHTML = `
            <div class="menu-icon">${icon}</div>
            <div class="menu-info">
                <div class="menu-name">${menu.name}</div>
                <div class="menu-desc">${menu.desc}</div>
            </div>
        `;
          listEl.appendChild(div);
        });

        switchScreen("summon");
      }

      function runLottery() {
        const btn = document.getElementById("btn-roll");
        const display = document.getElementById("lottery-display");
        const wrapper = display.querySelector(".fantasy-chest-wrapper");
        const chest = display.querySelector(".chest-visual");

        btn.disabled = true;

        // Start normal shake
        wrapper.classList.add("chest-shake");

        let elapsed = 0;
        const interval = setInterval(() => {
          elapsed += 100;

          // Phase 1 (0s - 1.5s): Normal Shake

          // Phase 2 (1.5s - 2.5s): Violent Shake (Gaudy effect start)
          if (elapsed > 1500 && elapsed < 2500) {
            wrapper.style.animationName = "shake-hard";
            wrapper.style.animationDuration = "0.1s";
          }

          // Phase 3 (2.5s - 3.0s): Flash/Bright Glow (Maximum anticipation)
          if (elapsed > 2500 && elapsed < 3000) {
            chest.style.filter = "sepia(1) brightness(3) drop-shadow(0 0 50px gold)";
            document.body.style.backgroundColor = "#333"; // Slight screen flash backup
          }

          // Phase 4 (3.0s - 3.5s): Reset and Open
          if (elapsed > 3500) {
            clearInterval(interval);
            wrapper.classList.remove("chest-shake", "chest-shining");
            wrapper.style.animation = "";
            wrapper.style.animationDuration = "";
            chest.style.filter = "";
            document.body.style.backgroundColor = "";

            determineResult();
            btn.disabled = false;
          }
        }, 100);
      }

      function determineResult() {
        const isBigWin = Math.random() < 0.1;
        const display = document.getElementById("lottery-display");
        const content = document.getElementById("result-content");
        const title = document.getElementById("result-title");

        console.log("Lottery result:", isBigWin ? "BIG WIN" : "Win");

        if (isBigWin) {
          display.innerHTML = '<div class="chest-open">💎</div>';
          title.textContent = "★ 大当たり！伝説の報酬 ★";
          title.style.color = "#e74c3c";

          const serial = "FREE-" + Math.random().toString(36).substring(2, 8).toUpperCase();
          content.innerHTML = `
            <div style="color:#d4af37">次回使えるドリンク無料券</div>
            <div class="serial-code">${serial}</div>
            <div style="font-size:0.8rem; margin-top:10px;">店員さんにこのコードを見せてください</div>
        `;

          createConfetti();
        } else {
          display.innerHTML = "<div>📜</div>";
          title.textContent = "宝箱確認";
          title.style.color = "#d4af37";

          const reward = REWARDS[Math.floor(Math.random() * REWARDS.length)];
          const typeLabel = reward.type === "tip" ? "美味しい食べ方豆知識" : "店主からの感謝の言葉";

          console.log("Reward displayed:", typeLabel, reward.text);

          content.innerHTML = `
                <div style="font-size:1rem; margin-bottom:10px;">宝箱の中身は『<span style="color:var(--primary); font-weight:bold;">${typeLabel}</span>』だった。</div>
                <div style="margin-top:10px; color:#ccc; font-style:italic;">"${reward.text}"</div>
              `;
        }

        saveToStorage();
        switchScreen("result");
      }

      function createConfetti() {
        const colors = ["#f00", "#0f0", "#00f", "#ff0", "#0ff", "#f0f"];
        for (let i = 0; i < 50; i++) {
          const conf = document.createElement("div");
          conf.className = "confetti";
          conf.style.left = Math.random() * 100 + "vw";
          conf.style.top = "-10px";
          conf.style.background = colors[Math.floor(Math.random() * colors.length)];
          conf.style.animationDuration = Math.random() * 2 + 1 + "s";
          document.body.appendChild(conf);
          setTimeout(() => conf.remove(), 3000);
        }
      }

      window.onload = init;
    </script>
  </body>
</html>
