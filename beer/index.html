<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ビール泡採点ゲーム</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #8b4513;
        background-image:
          linear-gradient(
            45deg,
            #a0522d 25%,
            transparent 25%,
            transparent 75%,
            #a0522d 75%,
            #a0522d
          ),
          linear-gradient(
            45deg,
            #a0522d 25%,
            transparent 25%,
            transparent 75%,
            #a0522d 75%,
            #a0522d
          );
        background-size: 40px 40px;
        background-position:
          0 0,
          20px 20px;
        font-family: "Hiragino Kaku Gothic ProN", sans-serif;
        color: white;
        user-select: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100vh;
      }
      #ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 20px;
        box-sizing: border-box;
      }
      #score-board {
        text-align: left;
        font-size: 24px;
        text-shadow: 2px 2px 4px black;
        pointer-events: auto;
      }
      #message-area {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        pointer-events: auto;
        background: rgba(0, 0, 0, 0.85);
        padding: 30px;
        border-radius: 15px;
        border: 2px solid #ffd700;
        max-width: 80%;
        z-index: 100;
      }
      #message-title {
        font-size: 36px;
        margin-bottom: 20px;
        font-weight: bold;
        text-shadow: 3px 3px 0px #000;
        color: #ffd700;
      }
      #message-instruction {
        font-size: 18px;
        line-height: 1.6;
        color: #fff;
      }
      #feedback-toast {
        position: absolute;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 48px;
        font-weight: bold;
        text-align: center;
        text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        opacity: 0;
        transition: opacity 0.3s;
        z-index: 50;
        width: 100%;
      }
      canvas {
        background-color: rgba(0, 0, 0, 0.3);
        border: 4px solid #fff;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        max-width: 90%;
        max-height: 70%;
        margin-top: 20px;
        display: block;
        cursor: crosshair;
      }
      #controls {
        margin-top: 20px;
        pointer-events: auto;
        display: flex;
        gap: 20px;
        flex-direction: column;
        align-items: center;
        width: 100%;
      }
      button,
      .file-upload-label {
        background: linear-gradient(to bottom, #ffd700, #ff8c00);
        border: none;
        border-radius: 8px;
        padding: 15px 40px;
        font-size: 20px;
        font-weight: bold;
        color: #5a2d0c;
        cursor: pointer;
        box-shadow:
          0 4px 0 #8b4513,
          0 5px 10px rgba(0, 0, 0, 0.3);
        transition:
          transform 0.1s,
          box-shadow 0.1s;
        font-family: inherit;
      }
      button:active,
      .file-upload-label:active {
        transform: translateY(4px);
        box-shadow:
          0 0 0 #8b4513,
          inset 0 2px 5px rgba(0, 0, 0, 0.2);
      }
      button:disabled,
      .file-upload-label.disabled {
        background: #ccc;
        color: #666;
        cursor: not-allowed;
        box-shadow: none;
        transform: none;
      }
      #fileInput {
        display: none;
      }
      .hidden {
        display: none !important;
      }
      #current-score-display {
        font-size: 48px;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div id="ui-layer">
      <div id="score-board">
        <div>今回の得点: <span id="score">-</span></div>
        <div>最高記録: <span id="best-score">0</span></div>
      </div>
      <div id="feedback-toast"></div>
    </div>

    <div id="message-area">
      <h1 id="message-title">ビール泡採点ゲーム</h1>
      <div id="message-instruction">
        画面に点線の円がランダムで出現します。<br />
        その円の中心にある白い点にマウスを合わせ、左ボタンを押し続けて泡を成長させます。<br />
        ボタンを離すと泡の大きさが評価され、点数が加算されます。<br />
        <ul style="text-align: left; display: inline-block">
          <li>差が10px以内 → 100点 「完璧！最高！」</li>
          <li>差が30px以内 → 50点 「なかなか良い！」</li>
          <li>それ以上 → 0点 「残念...」</li>
        </ul>
        <br />
        合計1000点以上でクリアです。<br />
        [スタートボタンを押して開始]
      </div>
      <button id="start-btn" style="margin-top: 20px">スタート</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="controls" class="hidden">
      <label for="fileInput" class="file-upload-label" id="upload-label">
        📷 写真をアップロード
      </label>
      <input type="file" id="fileInput" accept="image/*" />

      <button id="analyze-btn" class="hidden">🍺 採点開始！</button>
    </div>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      const scoreEl = document.getElementById("score");
      const bestScoreEl = document.getElementById("best-score");
      const messageArea = document.getElementById("message-area");
      const messageTitle = document.getElementById("message-title");
      const messageInstruction = document.getElementById("message-instruction");
      const feedbackToast = document.getElementById("feedback-toast");
      const startBtn = document.getElementById("start-btn");
      const uploadLabel = document.getElementById("upload-label");
      const fileInput = document.getElementById("fileInput");
      const analyzeBtn = document.getElementById("analyze-btn");
      const controls = document.getElementById("controls");

      window.projectId = "beer_foam_grading";
      const STORAGE_KEY = "game_" + window.projectId;

      let width, height;
      let bestScore = 0;
      let gameState = "START";
      let uploadedImage = null;
      let scanLineY = 0;
      let animationId;

      function init() {
        loadBestScore();
        resize();
        window.addEventListener("resize", resize);

        startBtn.addEventListener("click", () => {
          if (gameState === "START" || gameState === "RESULT") {
            enterGameMode();
          }
        });

        fileInput.addEventListener("change", handleFileUpload);
        analyzeBtn.addEventListener("click", startAnalysis);

        console.log("Game initialized");
      }

      function resize() {
        const maxWidth = window.innerWidth * 0.9;
        const maxHeight = window.innerHeight * 0.7;

        if (uploadedImage) {
          const scale = Math.min(
            maxWidth / uploadedImage.width,
            maxHeight / uploadedImage.height,
            1,
          );
          width = uploadedImage.width * scale;
          height = uploadedImage.height * scale;
        } else {
          width = 600;
          height = 400;
        }

        canvas.width = width;
        canvas.height = height;

        if (gameState === "RESULT" && uploadedImage) {
          drawImage();
        }
      }

      function loadBestScore() {
        try {
          const data = localStorage.getItem(STORAGE_KEY);
          if (data) {
            bestScore = parseInt(data, 10);
            bestScoreEl.textContent = bestScore;
            console.log("Loaded best score:", bestScore);
          }
        } catch (e) {
          console.error("Failed to load from localStorage", e);
        }
      }

      function saveBestScore() {
        try {
          localStorage.setItem(STORAGE_KEY, bestScore.toString());
          console.log("Saved best score:", bestScore);
        } catch (e) {
          console.error("Failed to save to localStorage", e);
        }
      }

      function enterGameMode() {
        gameState = "PLAYING";
        uploadedImage = null;
        scoreEl.textContent = "-";
        messageArea.classList.add("hidden");
        controls.classList.remove("hidden");
        analyzeBtn.classList.add("hidden");

        fileInput.value = "";

        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = "#fff";
        ctx.font = "20px 'Hiragino Kaku Gothic ProN'";
        ctx.textAlign = "center";
        ctx.fillText("ここに写真が表示されます", width / 2, height / 2);
      }

      function handleFileUpload(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            uploadedImage = img;
            resize();
            drawImage();
            analyzeBtn.classList.remove("hidden");
            uploadLabel.textContent = "🔄 他の写真に変更";
            console.log("Image uploaded successfully");
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      }

      function drawImage() {
        if (!uploadedImage) return;
        ctx.clearRect(0, 0, width, height);
        ctx.drawImage(uploadedImage, 0, 0, width, height);
      }

      function startAnalysis() {
        if (!uploadedImage) return;
        gameState = "ANALYZING";
        analyzeBtn.disabled = true;
        uploadLabel.classList.add("disabled");

        scanLineY = 0;
        loop();
      }

      function loop() {
        if (gameState !== "ANALYZING") {
          if (animationId) cancelAnimationFrame(animationId);
          return;
        }

        drawImage();

        ctx.strokeStyle = "#00ff00";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(0, scanLineY);
        ctx.lineTo(width, scanLineY);
        ctx.stroke();

        ctx.fillStyle = "rgba(0, 255, 0, 0.2)";
        ctx.fillRect(0, 0, width, scanLineY);

        scanLineY += height / 30;

        if (scanLineY >= height) {
          gameState = "RESULT";
          calculateScore();
        } else {
          animationId = requestAnimationFrame(loop);
        }
      }

      function calculateScore() {
        drawImage();

        const frame = ctx.getImageData(0, 0, width, height);
        const data = frame.data;
        const pixelCount = width * height;

        let r, g, b, avg;
        let totalBrightness = 0;
        let brightnessCounts = new Array(256).fill(0);

        for (let i = 0; i < data.length; i += 4) {
          r = data[i];
          g = data[i + 1];
          b = data[i + 2];
          avg = Math.floor((r + g + b) / 3);
          totalBrightness += avg;
          brightnessCounts[avg]++;
        }

        const meanBrightness = totalBrightness / pixelCount;

        let varianceSum = 0;
        for (let i = 0; i < 256; i++) {
          const diff = i - meanBrightness;
          varianceSum += diff * diff * brightnessCounts[i];
        }
        const stdDev = Math.sqrt(varianceSum / pixelCount);

        // Heuristic for "Good Beer Foam"
        // Foam should be bright (high mean) but textured (high stdDev)
        // Beer Foam color range roughly 200-240.
        // Paper/White wall is bright but flat (low stdDev).

        let score = 0;

        // 1. Brightness Score: Peak around 220
        const idealBrightness = 220;
        const brightnessDiff = Math.abs(meanBrightness - idealBrightness);
        const brightnessScore = Math.max(0, 100 - (brightnessDiff / 255) * 200);

        // 2. Texture Score: Higher stdDev is better (bubbles)
        const idealStdDev = 50;
        const stdDiff = Math.abs(stdDev - idealStdDev);
        const textureScore = Math.max(0, 100 - (stdDiff / 50) * 100);

        // Combine logic
        // Foam is bright AND bubbly.
        score = brightnessScore * 0.4 + textureScore * 0.6;

        // Add a random factor of +/- 5 to simulate "AI mood" (game feel)
        score += Math.random() * 10 - 5;

        score = Math.max(0, Math.min(100, Math.round(score)));

        console.log(
          `Analysis complete. Mean: ${meanBrightness.toFixed(1)}, Std: ${stdDev.toFixed(1)}`,
        );

        showResult(score);
      }

      function showResult(score) {
        scoreEl.textContent = score;
        analyzeBtn.disabled = false;
        uploadLabel.classList.remove("disabled");

        if (score > bestScore) {
          bestScore = score;
          bestScoreEl.textContent = bestScore;
          saveBestScore();
        }

        let message = "";
        let color = "#fff";

        if (score >= 95) {
          message = "95点以上！もう一杯サービス！！🍺";
          color = "#FFD700";
          confettiEffect();
        } else if (score >= 85) {
          message = "素晴らしい泡の芸術！";
          color = "#fff";
        } else if (score >= 70) {
          message = "まずまずのビールですね。";
          color = "#ccc";
        } else if (score >= 50) {
          message = "泡がもう少し欲しいかも...";
          color = "#ccc";
        } else {
          message = "これはビール？";
          color = "#999";
        }

        showFeedback(message, color);
      }

      function showFeedback(text, color) {
        feedbackToast.textContent = text;
        feedbackToast.style.color = color;
        feedbackToast.style.opacity = 1;

        setTimeout(() => {
          feedbackToast.style.opacity = 0;
        }, 3000);
      }

      function confettiEffect() {
        // Simple visual feedback on canvas
        const colors = ["#f00", "#0f0", "#00f", "#ff0", "#0ff", "#f0f"];

        for (let i = 0; i < 100; i++) {
          const x = Math.random() * width;
          const y = Math.random() * height;
          const c = colors[Math.floor(Math.random() * colors.length)];
          ctx.fillStyle = c;
          ctx.beginPath();
          ctx.arc(x, y, Math.random() * 5 + 2, 0, Math.PI * 2);
          ctx.fill();
        }
        setTimeout(() => {
          if (gameState === "RESULT") drawImage();
        }, 2000);
      }

      init();
    </script>
  </body>
</html>
