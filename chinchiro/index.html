<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ハイボールチンチロリン</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    
    html, body {
      width: 100%;
      height: 100%;
      height: 100dvh;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      background-image: url('backscreen.jpg');
      background-position: center center;
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
      font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      font-weight: bold;
      color: #fff;
      touch-action: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 6dvh; /* タイトルの位置をさらに少し下に下げてバランス調整 */
    }
    
    /* 【演出】サイコロが回っているときだけ画面全体を覆う「ドキドキ座布団」 */
    #curtain {
      position: fixed;
      inset: 0;
      background: rgba(12, 5, 3, 0.82); /* 漆黒に近い高級感のある半透明黒 */
      z-index: 5;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease; /* じわっと暗くなる演出 */
    }
    #curtain.active {
      opacity: 1;
    }

    /* 3Dサイコロエリア（座布団より手前に表示するため z-index を 6 に） */
    #gameCanvas { 
      display: block; 
      width: 100%; 
      height: 40vh; 
      background: transparent; 
      z-index: 6; 
      position: relative;
    }
    
    /* UI全体のレイアウト（四角い箱をなくし、文字影で可読性を担保） */
    #ui-container {
      width: 100%;
      max-width: 450px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      z-index: 10;
      padding: 0 20px;
    }
    
    /* 【修正】ダサい四角を廃止し、文字だけで粋に魅せる */
    #game-title {
      font-size: 36px;
      color: #ffd600;
      text-shadow: 2px 2px 5px #000, -2px -2px 5px #000, 0 0 15px rgba(255,234,0,0.6);
      text-align: center;
      letter-spacing: 2px;
      transition: opacity 0.3s;
    }

    /* 【修正】結果発表も箱をなくし、文字サイズを大きくしてドカンとアピール */
    #result-display {
      font-size: 34px;
      min-height: 45px;
      line-height: 1.4;
      color: #fff;
      text-shadow: 2px 2px 6px #000, -2px -2px 6px #000;
      text-align: center;
      transition: opacity 0.3s;
    }

    #dice-values {
      font-size: 18px;
      color: #ffeb3b;
      margin-top: 5px;
      text-shadow: 1px 1px 4px #000;
      transition: opacity 0.3s;
    }
    
    /* 回転中に文字を一時的に消してサイコロを目立たせるためのクラス */
    .fade-out { opacity: 0 !important; pointer-events: none; }

    /* ボタンコンテナ */
    #btn-container {
      margin-top: auto;
      margin-bottom: 5dvh;
      z-index: 10;
      width: 85%;
      max-width: 380px;
    }

    .btn-roll {
      width: 100%;
      background: #e67e22;
      color: #fff;
      border: 4px solid #ffd600;
      padding: 14px 0;
      font-size: 24px;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.6);
      transition: all 0.1s;
    }
    .btn-roll:disabled {
      background: #4b5563 !important;
      color: #9ca3af !important;
      border-color: #6b7280 !important;
      box-shadow: none !important;
      transform: none !important;
      opacity: 0.95;
    }

    /* 【修正】ルール早見表も箱ではなく、透け感のあるお札のような風合いに */
    #rule-panel {
      margin-top: 5px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 214, 0, 0.4);
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      transition: opacity 0.3s;
    }
    .rule-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed rgba(255,255,255,0.15); padding-bottom: 4px; }
    .rule-item:last-child { border-bottom: none; padding-bottom: 0; }
    .rule-label { color: #ffeb3b; }
    .rule-prize { color: #fff; font-size: 14px; text-shadow: 1px 1px 2px #000; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <div id="curtain"></div>

  <div id="ui-container">
    <div id="game-title">ハイボールチンチロリン</div>
    <div id="result-display">一回勝負！サイコロを振ってください</div>
    <div id="dice-values">・ ・ ・</div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div id="ui-container">
    <div id="rule-panel">
      <div class="rule-item"><span class="rule-label">🎲 ゾロ目</span><span class="rule-prize" id="lbl-zoro">-</span></div>
      <div class="rule-item"><span class="rule-label">🎲 合計が【奇数】</span><span class="rule-prize" id="lbl-kisu">-</span></div>
      <div class="rule-item"><span class="rule-label">🎲 合計が【偶数】</span><span class="rule-prize" id="lbl-gusu">-</span></div>
      <div class="rule-item"><span class="rule-label">🎲 その他</span><span class="rule-prize" id="lbl-other">通常料金</span></div>
    </div>
  </div>

  <div id="btn-container">
    <button class="btn-roll" id="btn-roll">サイコロを振る！</button>
  </div>

  <script>
    const CONFIG = {
      TITLE: "ハイボールチンチロリン", 
      PRIZE_ZORO: "通常サイズ 【無料】!!",   
      PRIZE_KISU: "通常サイズ 【半額】!",    
      PRIZE_GUSU: "強制【メガジョッキ】倍額", 
      PRIZE_OTHER: "通常料金（そのまま）"     
    };

    document.getElementById('game-title').innerText = CONFIG.TITLE;
    document.title = CONFIG.TITLE;
    document.getElementById('lbl-zoro').innerText = CONFIG.PRIZE_ZORO;
    document.getElementById('lbl-kisu').innerText = CONFIG.PRIZE_KISU;
    document.getElementById('lbl-gusu').innerText = CONFIG.PRIZE_GUSU;
    document.getElementById('lbl-other').innerText = CONFIG.PRIZE_OTHER;

    // 🔒 不正リロード＆再読み込みブロック
    window.addEventListener('beforeunload', (e) => { e.preventDefault(); e.returnValue = 'ロック中'; });
    window.addEventListener('keydown', (e) => {
      if (e.key === 'F5' || (e.ctrlKey && e.key === 'r') || (e.metaKey && e.key === 'r')) e.preventDefault();
    });
    document.addEventListener('contextmenu', (e) => { e.preventDefault(); });

    // --- 音響システム ---
    class SynthAudio {
      constructor() { this.ctx = null; }
      init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      play(freq, endFreq, duration, type = 'triangle', vol = 0.1) {
        if(!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type; osc.connect(gain); gain.connect(this.ctx.destination);
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(endFreq, this.ctx.currentTime + duration);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
        osc.start(); osc.stop(this.ctx.currentTime + duration);
      }
      playClick() { this.play(900, 400, 0.04, 'triangle', 0.08); } 
      playStop() { this.play(160, 80, 0.1, 'sine', 0.2); } 
      playWin() { 
        const notes = [587, 659, 784, 880, 988, 1174]; 
        notes.forEach((f, i) => {
          setTimeout(() => this.play(f, f, 0.12, 'square', 0.03), i * 70);
        });
      }
    }
    const audio = new SynthAudio();
    document.body.addEventListener('pointerdown', () => audio.init(), { once: true });

    // --- Three.js セットアップ ---
    const canvas = document.getElementById('gameCanvas');
    const scene = new THREE.Scene();
    
    const camera = new THREE.PerspectiveCamera(36, window.innerWidth / (window.innerHeight * 0.4), 0.1, 1000);
    camera.position.set(0, 0, 6.2);
    camera.lookAt(0, 0, 0);
    
    const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight * 0.4);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.0); 
    scene.add(ambientLight);

    // --- 通常ドットサイコロテクスチャ ---
    const diceNumbers = [3, 4, 1, 6, 2, 5]; 
    const dotPositions = {
      1: [[64, 64]],
      2: [[34, 34], [94, 94]],
      3: [[34, 34], [64, 64], [94, 94]],
      4: [[34, 34], [34, 94], [94, 34], [94, 94]],
      5: [[34, 34], [34, 94], [64, 64], [94, 34], [94, 94]],
      6: [[34, 34], [34, 64], [34, 94], [94, 34], [94, 64], [94, 94]]
    };

    function createDiceMaterials() {
      const mats = [];
      diceNumbers.forEach(num => {
        const c = document.createElement('canvas');
        c.width = 128; c.height = 128;
        const ctx = c.getContext('2d');
        
        ctx.fillStyle = '#fffdfa';
        ctx.fillRect(0, 0, 128, 128);
        ctx.strokeStyle = '#e5dcd0';
        ctx.lineWidth = 3;
        ctx.strokeRect(4, 4, 120, 120);

        const dots = dotPositions[num];
        ctx.fillStyle = num === 1 ? '#cc241d' : '#282828'; 
        dots.forEach(pos => {
          ctx.beginPath();
          const radius = num === 1 ? 24 : 11; // 1の赤目をさらに強調
          ctx.arc(pos[0], pos[1], radius, 0, Math.PI * 2);
          ctx.fill();
        });
        
        const tex = new THREE.CanvasTexture(c);
        mats.push(new THREE.MeshStandardMaterial({ map: tex, roughness: 0.25 }));
      });
      return mats;
    }
    const diceMaterials = createDiceMaterials();

    const faceRotations = {
      1: new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), Math.PI / 2),
      2: new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), 0),
      3: new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), -Math.PI / 2),
      4: new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), Math.PI / 2),
      5: new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), Math.PI),
      6: new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), -Math.PI / 2)
    };

    // --- 賽オブジェクトの作成 ---
    const diceMeshes = [];
    // 【修正】サイコロの1辺を 0.85 ➡️ 1.15 へ大幅に巨大化！
    const geo = new THREE.BoxGeometry(1.15, 1.15, 1.15);

    for (let i = 0; i < 3; i++) {
      const mesh = new THREE.Mesh(geo, diceMaterials);
      scene.add(mesh);
      diceMeshes.push({
        mesh: mesh,
        angle: i * (Math.PI * 2 / 3),
        targetQuat: new THREE.Quaternion(),
        rotSpeed: new THREE.Vector3()
      });
    }

    // --- ルール判定ロジック ---
    function judgeChinchiroRule(dice) {
      const [d1, d2, d3] = dice;
      const total = d1 + d2 + d3;

      if (d1 === d2 && d2 === d3) {
        return { name: `ゾロ目！🎉\n${CONFIG.PRIZE_ZORO}`, isWin: true };
      }
      if (total % 2 !== 0) {
        return { name: `合計 ${total} (奇数)！👍\n${CONFIG.PRIZE_KISU}`, isWin: true };
      } else {
        return { name: `合計 ${total} (偶数)！😲\n${CONFIG.PRIZE_GUSU}`, isWin: false };
      }
    }

    // 各要素の取得
    const rollButton = document.getElementById('btn-roll');
    const resultDisplay = document.getElementById('result-display');
    const diceValuesDisplay = document.getElementById('dice-values');
    const curtain = document.getElementById('curtain');
    const gameTitle = document.getElementById('game-title');
    const rulePanel = document.getElementById('rule-panel');

    let rollTimeline = 0;
    let finalResults = [1, 2, 3];

    function rollDice() {
      if (rollTimeline > 0) return; 
      
      rollButton.disabled = true;

      // 【新演出】文字をフッと消して、全画面の黒い座布団を敷く
      curtain.classList.add('active');
      gameTitle.classList.add('fade-out');
      resultDisplay.classList.add('fade-out');
      diceValuesDisplay.classList.add('fade-out');
      rulePanel.classList.add('fade-out');

      finalResults = [
        Math.floor(Math.random() * 6) + 1,
        Math.floor(Math.random() * 6) + 1,
        Math.floor(Math.random() * 6) + 1
      ];

      diceMeshes.forEach((dice) => {
        dice.rotSpeed.set(
          6 + Math.random() * 4,
          6 + Math.random() * 4,
          6 + Math.random() * 4
        );
        dice.targetQuat.copy(faceRotations[finalResults[diceMeshes.indexOf(dice)]]);
      });

      // 【修正】回転時間を 2.0秒 ➡️ 3.0秒 へ1秒間延長！
      rollTimeline = 3.0; 
    }

    rollButton.addEventListener('click', () => {
      audio.init();
      rollDice();
    });

    // --- メインループ ---
    const clock = new THREE.Clock();

    renderer.setAnimationLoop(() => {
      const dt = clock.getDelta();

      if (rollTimeline > 0) {
        rollTimeline -= dt;

        diceMeshes.forEach((dice, index) => {
          if (rollTimeline > 0.5) {
            // 暗闇の中で巨大なサイコロが激しくアクロバティックに飛び回る
            dice.angle += dt * 7.5;
            let radius = 0.65 + rollTimeline * 0.2; // 巨大化に合わせて円運動の半径も外側に調整
            let px = Math.cos(dice.angle + index) * radius;
            let pz = Math.sin(dice.angle + index) * radius;
            let py = -0.05 + (Math.pow(px,2) + Math.pow(pz,2)) * 0.08; 
            
            dice.mesh.position.set(px, py, pz);

            dice.mesh.rotateX(dice.rotSpeed.x * dt);
            dice.mesh.rotateY(dice.rotSpeed.y * dt);
            dice.mesh.rotateZ(dice.rotSpeed.z * dt);
            
            if (Math.random() < 0.07) audio.playClick(); 
          } else {
            // ラスト0.5秒で、イラストの白い空間（高さ-0.15）に向かってスローモーションのように吸着
            let targetX = (index - 1) * 1.25; // 巨大化したのでサイコロ同士がぶつからないよう間隔を広げる(0.95→1.25)
            dice.mesh.position.x = THREE.MathUtils.lerp(dice.mesh.position.x, targetX, 0.15);
            dice.mesh.position.y = THREE.MathUtils.lerp(dice.mesh.position.y, -0.15, 0.15); 
            dice.mesh.position.z = THREE.MathUtils.lerp(dice.mesh.position.z, 0, 0.15);
            
            dice.mesh.quaternion.slerp(dice.targetQuat, 0.25);
          }
        });

        // 完全停止・リザルト解放の瞬間
        if (rollTimeline <= 0) {
          rollTimeline = 0;
          
          diceMeshes.forEach((dice, index) => {
            dice.mesh.position.set((index - 1) * 1.25, -0.15, 0);
            dice.mesh.quaternion.copy(dice.targetQuat); // 完全正面ロック
          });

          audio.playStop();

          // 【新演出】サイコロが止まった瞬間に黒幕を消し、文字を一気に復活させる
          curtain.classList.remove('active');
          gameTitle.classList.remove('fade-out');
          resultDisplay.classList.remove('fade-out');
          diceValuesDisplay.classList.remove('fade-out');
          rulePanel.classList.remove('fade-out');

          // ルール判定
          const result = judgeChinchiroRule(finalResults);
          diceValuesDisplay.innerText = `出目: ［ ${finalResults[0]} ］［ ${finalResults[1]} ］［ ${finalResults[2]} ］`;
          resultDisplay.innerText = result.name;
          
          if (result.isWin) {
            resultDisplay.style.color = "#39ff14"; 
            audio.playWin();
          } else {
            resultDisplay.style.color = "#ff1744"; 
          }

          // ボタンをロック
          rollButton.innerText = "また挑戦してね";
          rollButton.disabled = true;
        }
      } else {
        diceMeshes.forEach((dice, index) => {
          dice.mesh.position.set((index - 1) * 1.25, -0.15, 0);
        });
      }

      renderer.render(scene, camera);
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / (window.innerHeight * 0.4);
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight * 0.4);
    });
  </script>
</body>
</html>
