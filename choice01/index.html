<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本日のおすすめ診断</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #fff8e1; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        .hidden { display: none; }
        
        /* ボタンのデザイン */
        button { 
            width: 80%; padding: 15px; margin: 10px; font-size: 18px; 
            border: none; border-radius: 10px; background: #ff9800; color: white; cursor: pointer;
        }

        /* くるくるアニメーション */
        .loader {
            border: 16px solid #f3f3f3; border-top: 16px solid #ff5722;
            border-radius: 50%; width: 100px; height: 100px;
            animation: spin 1s linear infinite; margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ジャジャーン！の拡大演出 */
        .result-img { width: 200px; animation: taraaan 0.5s ease-out; }
        @keyframes taraaan { 0% { transform: scale(0); } 80% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="card">
    <div id="q1">
        <h2>今の気分は？</h2>
        <button onclick="next(2, 'sukkiri')">スッキリしたい！</button>
        <button onclick="next(2, 'gatsuri')">ガッツリ食べたい！</button>
    </div>

    <div id="q2" class="hidden">
        <h2>飲み物は？</h2>
        <button onclick="showResult('beer')">とりあえずビール！</button>
        <button onclick="showResult('sour')">サワー・ハイボール</button>
    </div>

    <div id="loading" class="hidden">
        <h2>運命のメニューを選定中...</h2>
        <div class="loader"></div>
    </div>

    <div id="result" class="hidden">
        <h1 style="color: #e64a19;">ジャジャーン！</h1>
        <p>あなたへのおすすめはこれだ！</p>
        <div id="menu-name" style="font-size: 24px; font-weight: bold; margin: 20px;"></div>
        <div id="menu-img"></div>
        <button onclick="location.reload()" style="background: #757575;">もう一度診断する</button>
    </div>
</div>

<script>
    let choice1 = "";

    function next(step, choice) {
        choice1 = choice;
        document.getElementById('q1').classList.add('hidden');
        document.getElementById('q2').classList.remove('hidden');
    }

    function showResult(choice2) {
        document.getElementById('q2').classList.add('hidden');
        document.getElementById('loading').classList.remove('hidden');

        // 1.5秒の「くるくる演出」
        setTimeout(() => {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
            
            const menuName = document.getElementById('menu-name');
            // ここで質問の組み合わせに応じてメニューを変える
            if (choice1 === 'gatsuri' && choice2 === 'beer') {
                menuName.innerText = "特製スタミナ餃子！";
            } else if (choice1 === 'sukkiri') {
                menuName.innerText = "朝獲れ鮮魚のカルパッチョ！";
            } else {
                menuName.innerText = "自慢の串焼き盛り合わせ！";
            }
        }, 1500);
    }
</script>

</body>
</html>
