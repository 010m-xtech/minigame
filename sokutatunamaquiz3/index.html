<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>速達生クイズ</title>
  
  <!-- Tailwind CSS を読み込み -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- ブラウザ上でJSXを変換するための Babel を読み込み -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- ReactとアイコンライブラリをURLから直接インポートするための設定 -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1"
      }
    }
  </script>
</head>
<body>
  <!-- アプリが描画される場所 -->
  <div id="root"></div>

  <!-- アプリケーションのコード -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Beer, CheckCircle2, XCircle, ArrowRight, Trophy, PartyPopper, Timer } from 'lucide-react';

    // クイズデータ (Level.3)
    const questions = [
      {
        question: "独自の物流網により、工場出荷から原則2日以内（※一部例外有り）に生ビールを届ける「速達生」サービス。この「速達生」で現在取り扱っている銘柄を、次の10個の選択肢の中から該当するものすべて選んでください。\n※制限時間10秒以内でお答えください",
        options: [
          "A. サントリー ザ・プレミアム・モルツ", 
          "B. アサヒマルエフビール", 
          "C. アサヒスーパードライ", 
          "D. キリンラガービール", 
          "E. サントリー生ビール", 
          "F. サッポロ エビス", 
          "G. オリオンドラフトビール", 
          "H. キリン 一番搾り", 
          "I. サッポロ黒ラベル", 
          "J. よなよなエール"
        ],
        answerIndex: [0, 2, 4, 5, 7, 8], // A, C, E, F, H, I
        isMultiSelect: true,
        explanation: "「速達生」の対象となっているのは、アサヒ、サントリー、キリン、サッポロの4メーカーの計6銘柄です。"
      }
    ];

    function App() {
      const [gameState, setGameState] = useState('start'); // 'start', 'playing', 'result'
      const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [showExplanation, setShowExplanation] = useState(false);
      const [selectedAnswers, setSelectedAnswers] = useState([]);
      
      // タイマー用の状態
      const [timeLeft, setTimeLeft] = useState(10);
      const [isTimeUp, setIsTimeUp] = useState(false);

      // タイマーのカウントダウン処理
      useEffect(() => {
        if (gameState !== 'playing' || showExplanation) return;
        
        if (timeLeft > 0) {
          const timer = setInterval(() => {
            setTimeLeft((prev) => prev - 1);
          }, 1000);
          return () => clearInterval(timer);
        } else {
          // タイムアップ時の処理
          setIsTimeUp(true);
          submitAnswer(selectedAnswers, true);
        }
      }, [gameState, showExplanation, timeLeft]);

      const startGame = () => {
        setGameState('playing');
        setCurrentQuestionIndex(0);
        setScore(0);
        setShowExplanation(false);
        setSelectedAnswers([]);
        setTimeLeft(10);
        setIsTimeUp(false);
      };

      const handleOptionClick = (index) => {
        if (showExplanation) return;
        
        const currentQ = questions[currentQuestionIndex];
        if (currentQ.isMultiSelect) {
          if (selectedAnswers.includes(index)) {
            // すでに選ばれている場合は選択解除
            setSelectedAnswers(selectedAnswers.filter(i => i !== index));
          } else {
            // 個数制限をなくし、いくつでも選択可能にする
            setSelectedAnswers([...selectedAnswers, index]);
          }
        } else {
          setSelectedAnswers([index]);
          submitAnswer([index]);
        }
      };

      const submitAnswer = (answersToSubmit = selectedAnswers, timeUp = false) => {
        setShowExplanation(true);
        const currentQ = questions[currentQuestionIndex];
        const correctAns = currentQ.answerIndex;
        
        let isCorrect = false;
        if (currentQ.isMultiSelect) {
          // 選んだ個数と正解の個数が一致し、かつ全て正解に含まれているか
          isCorrect = answersToSubmit.length === correctAns.length && answersToSubmit.every(val => correctAns.includes(val));
        } else {
          isCorrect = answersToSubmit[0] === correctAns;
        }
        
        // タイムアップの場合は強制不正解
        if (timeUp) {
          isCorrect = false;
        }
        
        if (isCorrect) {
          setScore(score + 1);
        }
      };

      const nextQuestion = () => {
        if (currentQuestionIndex < questions.length - 1) {
          setCurrentQuestionIndex(currentQuestionIndex + 1);
          setShowExplanation(false);
          setSelectedAnswers([]);
          setTimeLeft(10);
          setIsTimeUp(false);
        } else {
          setGameState('result');
        }
      };

      const isCurrentQuestionCorrect = () => {
        if (isTimeUp) return false;
        const currentQ = questions[currentQuestionIndex];
        const correctAns = currentQ.answerIndex;
        if (currentQ.isMultiSelect) {
          return selectedAnswers.length === correctAns.length && selectedAnswers.every(val => correctAns.includes(val));
        } else {
          return selectedAnswers[0] === correctAns;
        }
      };

      const containerClass = gameState === 'start'
        ? "min-h-screen bg-gradient-to-br from-gray-900 via-black to-gray-800 font-sans relative overflow-hidden flex items-center justify-center p-4 transition-colors duration-700"
        : "min-h-screen bg-gradient-to-b from-yellow-300 via-amber-400 to-amber-500 font-sans text-gray-800 relative overflow-hidden flex items-center justify-center p-4 transition-colors duration-700";

      const BeerFoam = () => (
        <div className="absolute top-0 left-0 w-full z-0 overflow-hidden h-32 pointer-events-none">
          <div className="absolute -top-4 -left-4 w-32 h-32 bg-white rounded-full opacity-90 mix-blend-overlay"></div>
          <div className="absolute -top-10 left-10 w-40 h-40 bg-white rounded-full opacity-95 mix-blend-overlay"></div>
          <div className="absolute -top-2 left-24 w-28 h-28 bg-white rounded-full opacity-80 mix-blend-overlay"></div>
          <div className="absolute -top-6 left-1/3 w-36 h-36 bg-white rounded-full opacity-90 mix-blend-overlay -translate-x-1/2"></div>
          <div className="absolute -top-12 left-1/2 w-48 h-48 bg-white rounded-full opacity-95 mix-blend-overlay -translate-x-1/2"></div>
          <div className="absolute top-2 left-2/3 w-24 h-24 bg-white rounded-full opacity-70 mix-blend-overlay -translate-x-1/2"></div>
          <div className="absolute -top-8 right-32 w-36 h-36 bg-white rounded-full opacity-85 mix-blend-overlay"></div>
          <div className="absolute -top-10 right-16 w-40 h-40 bg-white rounded-full opacity-90 mix-blend-overlay"></div>
          <div className="absolute top-0 right-8 w-20 h-20 bg-white rounded-full opacity-80 mix-blend-overlay"></div>
          <div className="absolute -top-4 -right-4 w-32 h-32 bg-white rounded-full opacity-95 mix-blend-overlay"></div>
        </div>
      );

      return (
        <div className={containerClass}>
          {gameState !== 'start' && <BeerFoam />}

          <div className="relative z-10 w-full max-w-md mx-auto">
            
            {/* === スタート画面 === */}
            {gameState === 'start' && (
              <div className="bg-zinc-900/90 p-8 rounded-[2rem] shadow-2xl border border-zinc-700 text-center transform transition-all backdrop-blur-sm">
                <div className="flex justify-center mb-6">
                  <div className="bg-gradient-to-br from-amber-400 to-amber-600 p-4 rounded-full shadow-[0_0_20px_rgba(245,158,11,0.3)]">
                    <Beer size={64} className="text-white" />
                  </div>
                </div>
                <p className="text-lg font-bold text-gray-300 mb-4 tracking-tight">QRを読み込んでしまったあなた、</p>
                <p className="text-2xl font-extrabold text-amber-500 mb-2">突然ですが....</p>
                <p className="text-4xl font-black text-amber-500 mb-2 drop-shadow-[0_2px_15px_rgba(245,158,11,0.4)]">問題です！！</p>
                <p className="text-2xl font-black text-amber-400 mb-8 tracking-widest border-b-2 border-amber-500/50 inline-block pb-1">Level.3</p>
                
                <button 
                  onClick={startGame}
                  className="w-full py-4 bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 text-white text-xl font-bold rounded-2xl shadow-[0_0_15px_rgba(245,158,11,0.3)] transition-all transform hover:scale-105 flex items-center justify-center gap-2"
                >
                  <Timer size={24} /> 制限時間10秒で挑戦！
                </button>
              </div>
            )}

            {/* === プレイ画面 === */}
            {gameState === 'playing' && (
              <div className="bg-white/95 rounded-[2rem] p-6 shadow-2xl border-2 border-yellow-200">
                <div className="flex items-center justify-between mb-4">
                  <span className="bg-amber-500 text-white px-4 py-1.5 rounded-full text-sm font-bold shadow">
                    Q {currentQuestionIndex + 1} / {questions.length}
                  </span>
                  <span className="text-amber-600 font-bold text-sm">
                    速達生クイズ Level.3
                  </span>
                </div>

                {/* タイマー表示 */}
                {!showExplanation && (
                  <div className="mb-5 bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <div className="flex justify-between items-center mb-2">
                      <span className="font-bold text-gray-600 flex items-center gap-1">
                        <Timer size={16} /> 残り時間
                      </span>
                      <span className={`font-black text-2xl ${timeLeft <= 3 ? 'text-red-600 animate-pulse' : 'text-amber-600'}`}>
                        {timeLeft}秒
                      </span>
                    </div>
                    <div className="w-full bg-gray-200 rounded-full h-3">
                      <div 
                        className={`h-3 rounded-full transition-all duration-1000 ease-linear ${timeLeft <= 3 ? 'bg-red-500' : 'bg-amber-500'}`} 
                        style={{ width: `${(timeLeft / 10) * 100}%` }}
                      ></div>
                    </div>
                  </div>
                )}
                
                <h2 className="text-lg font-bold text-gray-800 mb-6 leading-relaxed whitespace-pre-wrap">
                  {questions[currentQuestionIndex].question}
                </h2>
                
                <div className="grid grid-cols-1 gap-2">
                  {questions[currentQuestionIndex].options.map((option, index) => {
                    const currentQ = questions[currentQuestionIndex];
                    const correctAns = currentQ.answerIndex;
                    const isCorrectOption = Array.isArray(correctAns) ? correctAns.includes(index) : index === correctAns;
                    const isSelected = selectedAnswers.includes(index);
                    
                    let buttonStyle = 'bg-white border-gray-200 hover:border-amber-400 hover:bg-amber-50 text-gray-700 p-3';
                    
                    if (showExplanation) {
                      if (isSelected && isCorrectOption) {
                        buttonStyle = 'bg-green-100 border-green-500 text-green-800 shadow-inner p-3';
                      } else if (isSelected && !isCorrectOption) {
                        buttonStyle = 'bg-red-100 border-red-400 text-red-800 p-3';
                      } else if (isCorrectOption) {
                        buttonStyle = 'bg-green-50 border-green-300 text-green-700 opacity-80 p-3';
                      } else {
                        buttonStyle = 'bg-white border-gray-200 text-gray-400 opacity-60 p-3';
                      }
                    } else if (isSelected) {
                       buttonStyle = 'bg-amber-100 border-amber-500 text-amber-900 shadow-inner p-3';
                    }

                    return (
                      <button
                        key={index}
                        onClick={() => handleOptionClick(index)}
                        disabled={showExplanation}
                        className={`w-full text-left rounded-xl border-2 font-bold transition-all ${buttonStyle} text-sm sm:text-base`}
                      >
                        <div className="flex items-center justify-between">
                          <span>{option}</span>
                          {!showExplanation && currentQ.isMultiSelect && (
                             <div className={`w-5 h-5 rounded flex items-center justify-center shrink-0 ml-2 border-2 ${isSelected ? 'bg-amber-500 border-amber-500' : 'border-gray-300'}`}>
                               {isSelected && <CheckCircle2 size={14} className="text-white" />}
                             </div>
                          )}
                          {showExplanation && isCorrectOption && <CheckCircle2 className="text-green-600 shrink-0 ml-2" size={18} />}
                          {showExplanation && isSelected && !isCorrectOption && <XCircle className="text-red-500 shrink-0 ml-2" size={18} />}
                        </div>
                      </button>
                    );
                  })}
                </div>

                {/* 複数選択時の回答ボタン */}
                {!showExplanation && questions[currentQuestionIndex].isMultiSelect && (
                   <button
                     onClick={() => submitAnswer()}
                     disabled={selectedAnswers.length === 0}
                     className={`mt-6 w-full py-4 font-bold rounded-xl shadow-lg flex items-center justify-center gap-2 transition-transform ${selectedAnswers.length > 0 ? 'bg-amber-500 hover:bg-amber-600 text-white active:scale-95' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}
                   >
                     解答する ({selectedAnswers.length}個選択中)
                   </button>
                )}

                {/* 解説エリア */}
                {showExplanation && (
                  <div className="mt-6">
                    <div className={`p-5 rounded-2xl flex items-start gap-3 border ${
                      isTimeUp ? 'bg-red-50 border-red-200 text-red-900' : (isCurrentQuestionCorrect() ? 'bg-green-50 border-green-200 text-green-900' : 'bg-red-50 border-red-200 text-red-900')
                    }`}>
                      {isTimeUp ? <XCircle className="shrink-0 mt-0.5 text-red-500" /> : (isCurrentQuestionCorrect() ? <CheckCircle2 className="shrink-0 mt-0.5 text-green-600" /> : <XCircle className="shrink-0 mt-0.5 text-red-500" />)}
                      <div>
                        <p className="font-extrabold text-lg mb-2">
                          {isTimeUp ? 'タイムアップ！残念！' : (isCurrentQuestionCorrect() ? '大正解！' : '残念！')}
                        </p>
                        <p className="text-sm leading-relaxed font-medium">
                          {questions[currentQuestionIndex].explanation}
                        </p>
                      </div>
                    </div>
                    
                    <button 
                      onClick={nextQuestion} 
                      className="mt-6 w-full py-4 bg-gray-800 hover:bg-black text-white font-bold rounded-xl shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95"
                    >
                      {currentQuestionIndex < questions.length - 1 ? '次の問題へ' : '結果を見る'} <ArrowRight size={20} />
                    </button>
                  </div>
                )}
              </div>
            )}

            {/* === 結果画面 === */}
            {gameState === 'result' && (
              <div className="bg-white/95 p-8 rounded-[2rem] shadow-2xl border-4 border-yellow-200 text-center">
                <div className="flex justify-center mb-4">
                  {score === questions.length ? (
                    <div className="bg-yellow-100 p-4 rounded-full relative">
                      <PartyPopper size={64} className="text-yellow-600" />
                      <Trophy size={32} className="text-yellow-500 absolute -bottom-2 -right-2" />
                    </div>
                  ) : (
                    <div className="bg-amber-100 p-4 rounded-full">
                      <Beer size={64} className="text-amber-500" />
                    </div>
                  )}
                </div>
                
                <h2 className="text-2xl font-bold text-gray-800 mb-2">クイズ結果</h2>
                <div className="text-5xl font-black text-amber-500 mb-6 flex justify-center items-baseline gap-2">
                  {score} <span className="text-2xl text-gray-600 font-bold">/ {questions.length}問正解</span>
                </div>

                <div className="bg-gray-100 rounded-xl p-4 mb-8">
                  <p className="font-bold text-gray-700">
                    {score === questions.length 
                      ? "パーフェクト！あなたは真の速達生マスターです！乾杯！" 
                      : "残念！お店で美味しい速達生を飲んで復習しよう！"}
                  </p>
                </div>
                
              </div>
            )}
            
          </div>
        </div>
      );
    }

    // アプリの起動
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
