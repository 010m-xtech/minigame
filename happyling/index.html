<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ハッピーリング・チャレンジ</title>
    <style>
      :root {
        --gold: #fbbf24;
        --amber: #d97706;
        --dark-bg: #1f2937;
        --panel-bg: #ffffff;
        --text-color: #1f2937;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family:
          "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans",
          Meiryo, sans-serif;
      }

      body {
        background-color: var(--dark-bg);
        color: var(--text-color);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      #game-container {
        width: 100%;
        height: 100%;
        max-width: 1280px;
        max-height: 924px;
        background-color: #fffef0;
        display: flex;
        flex-direction: column;
        position: relative;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      }

      header {
        background-color: var(--amber);
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 1.5rem;
        font-weight: bold;
        flex-shrink: 0;
      }

      main {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        overflow-y: auto;
        position: relative;
      }

      .hidden {
        display: none !important;
      }

      .avatar {
        width: 120px;
        height: 120px;
        background-color: var(--gold);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 3rem;
        border: 4px solid var(--amber);
        margin-bottom: 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .message-box {
        background: white;
        border: 2px solid var(--gold);
        border-radius: 15px;
        padding: 20px;
        margin-bottom: 20px;
        text-align: center;
        max-width: 500px;
        font-size: 1.2rem;
        position: relative;
      }

      .message-box::after {
        content: "";
        position: absolute;
        top: -10px;
        left: 50%;
        transform: translateX(-50%);
        border-width: 0 10px 10px;
        border-style: solid;
        border-color: transparent transparent var(--gold);
      }

      button {
        background-color: var(--amber);
        color: white;
        border: none;
        padding: 15px 30px;
        font-size: 1.2rem;
        border-radius: 50px;
        cursor: pointer;
        transition:
          transform 0.1s,
          background-color 0.2s;
        font-weight: bold;
        box-shadow: 0 4px 0 #b45309;
      }

      button:active {
        transform: translateY(4px);
        box-shadow: 0 0 0 #b45309;
      }

      button:hover {
        background-color: var(--gold);
      }

      button.secondary {
        background-color: #9ca3af;
        box-shadow: 0 4px 0 #4b5563;
      }

      input[type="text"],
      textarea {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 2px solid var(--gold);
        border-radius: 8px;
        font-size: 1rem;
      }

      .camera-frame {
        width: 300px;
        height: 400px;
        border: 4px dashed var(--amber);
        background-color: #f3f4f6;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        margin-bottom: 20px;
        position: relative;
        cursor: pointer;
      }

      .camera-icon {
        font-size: 4rem;
        color: var(--amber);
      }

      .scan-line {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background-color: #00ff00;
        box-shadow: 0 0 10px #00ff00;
        animation: scan 2s linear infinite;
      }

      @keyframes scan {
        0% {
          top: 0;
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          top: 100%;
          opacity: 0;
        }
      }

      .camera-frame video,
      .camera-frame img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 4px;
      }

      .game-area {
        display: flex;
        gap: 20px;
        margin-top: 20px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .barrel {
        width: 100px;
        height: 120px;
        background-color: #78350f;
        border-radius: 10px;
        border: 2px solid #451a03;
        display: flex;
        justify-content: center;
        align-items: center;
        color: var(--gold);
        font-size: 2rem;
        cursor: pointer;
        position: relative;
        transition: transform 0.2s;
      }

      .barrel:hover {
        transform: scale(1.05);
      }

      .barrel::before {
        content: "樽";
        font-weight: bold;
      }

      .barrel.opened {
        background-color: #fff;
        color: #000;
        border: 2px solid var(--gold);
      }

      .barrel.opened::before {
        content: "";
      }

      .coupon-card {
        background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%);
        border: 4px dashed var(--amber);
        padding: 30px;
        text-align: center;
        border-radius: 20px;
        width: 80%;
        max-width: 400px;
      }

      .qr-placeholder {
        width: 150px;
        height: 150px;
        background-color: white;
        margin: 20px auto;
        display: flex;
        justify-content: center;
        align-items: center;
        border: 1px solid #000;
      }

      .progress-bar {
        width: 0%;
        height: 20px;
        background-color: var(--amber);
        margin-top: 10px;
        transition: width 0.3s;
      }

      @media (max-width: 679px), (max-height: 642px) {
        header {
          font-size: 1.2rem;
          padding: 10px;
        }
        .avatar {
          width: 80px;
          height: 80px;
          font-size: 2rem;
        }
        .barrel {
          width: 80px;
          height: 100px;
        }
        button {
          padding: 10px 20px;
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <header>🍺 ハッピーリング・チャレンジ</header>

      <main id="scene-intro">
        <div class="avatar">🧑‍🍳</div>
        <div class="message-box">
          いらっしゃい！ビールのプロフェッショナルだよ。<br />
          今日は「ハッピーリング」に挑戦だ！<br />
          コツは「一口ごとにしっかり置く」ことだ。<br />
          さあ、飲み干したジョッキを見せてくれ！
        </div>
        <button id="btn-start">撮影を始める</button>
      </main>

      <main id="scene-photo" class="hidden">
        <div class="message-box">
          ジョッキのリングが綺麗に見えるように撮影してね。
        </div>
        <div class="camera-frame" id="camera-area">
          <div class="camera-icon">📷</div>
          <div style="margin-top: 10px">タップして撮影</div>
          <div class="scan-line hidden" id="scan-line-ui"></div>
        </div>
        <textarea
          id="photo-comment"
          rows="3"
          placeholder="今夜の感想やビールへの一言（例：最高においしい！）"
        ></textarea>
        <button id="btn-scan" class="hidden">アップロードして鑑定</button>
      </main>

      <main id="scene-analyzing" class="hidden">
        <div class="avatar">🔬</div>
        <div class="message-box">
          ただいまAIが解析中...<br />
          リングの美しさを数値化しています。
        </div>
        <div
          style="
            width: 80%;
            max-width: 400px;
            background: #e5e7eb;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
          "
        >
          <div class="progress-bar" id="analysis-progress"></div>
        </div>
        <div
          id="analysis-score"
          class="hidden"
          style="
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.5rem;
            color: var(--amber);
          "
        ></div>
      </main>

      <main id="scene-game" class="hidden">
        <div class="avatar">🎲</div>
        <div class="message-box">
          素晴らしいリングだ！ ハッピー度は<span id="score-display"></span
          >%だね。<br />
          特別な抽選チャンス！<br />
          当たりの樽をタップしてね！
        </div>
        <div class="game-area" id="barrels-container">
          <div class="barrel" data-id="0"></div>
          <div class="barrel" data-id="1"></div>
          <div class="barrel" data-id="2"></div>
        </div>
        <div
          id="game-message"
          style="margin-top: 15px; height: 20px; color: var(--amber)"
        ></div>
      </main>

      <main id="scene-result" class="hidden">
        <div id="result-content"></div>
        <div style="margin-top: 20px">
          <button id="btn-reset">最初に戻る</button>
        </div>
      </main>
    </div>

    <script>
      const projectId = window.projectId || "happy_ring";
      const storageKey = "game_" + projectId;

      const scenes = {
        intro: document.getElementById("scene-intro"),
        photo: document.getElementById("scene-photo"),
        analyzing: document.getElementById("scene-analyzing"),
        game: document.getElementById("scene-game"),
        result: document.getElementById("scene-result"),
      };

      let gameState = {
        score: 0,
        comment: "",
        won: false,
        history: [],
      };
      let cameraStream = null;
      let currentScene = "intro";

      function loadState() {
        const saved = localStorage.getItem(storageKey);
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            console.log("State loaded:", parsed);
          } catch (e) {
            console.log("No valid state found");
          }
        }
      }

      function saveState() {
        const dataToSave = {
          date: new Date().toISOString(),
          score: gameState.score,
          won: gameState.won,
        };
        localStorage.setItem(storageKey, JSON.stringify(dataToSave));
        console.log("State saved:", dataToSave);
      }

      function switchScene(sceneName) {
        if (currentScene === "photo" && sceneName !== "photo") {
          stopCamera();
        }

        Object.values(scenes).forEach((el) => el.classList.add("hidden"));
        scenes[sceneName].classList.remove("hidden");
        currentScene = sceneName;
        console.log("Scene switched to:", sceneName);

        if (sceneName === "photo") {
          startCamera();
        }
      }

      async function startCamera() {
        const area = document.getElementById("camera-area");
        // Remove any existing video element but keep UI (icon, text, scan line)
        const oldVideo = area.querySelector("video");
        if (oldVideo) oldVideo.remove();
        // If the browser does not support getUserMedia, show a fallback message.
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          console.warn("Camera not supported in this environment");
          // Show a non‑intrusive error message while keeping the original UI (icon, text, scan line)
          const existingError = area.querySelector(".camera-error");
          if (existingError) existingError.remove();
          const errorMsg = document.createElement("div");
          errorMsg.className = "camera-error";
          errorMsg.style.color = "#d97706";
          errorMsg.style.textAlign = "center";
          errorMsg.style.padding = "10px";
          errorMsg.textContent = "カメラが使用できません";
          area.appendChild(errorMsg);
          // Directly enable the upload button after a short delay.
          setTimeout(() => {
            document.getElementById("btn-scan").classList.remove("hidden");
          }, 500);
          return;
        }

        const video = document.createElement("video");
        video.autoplay = true;
        video.playsInline = true;
        video.muted = true;
        try {
          cameraStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
          });
          video.srcObject = cameraStream;
          // Remove any previous error message before adding the video element
          const prevError = area.querySelector(".camera-error");
          if (prevError) prevError.remove();
          area.appendChild(video);
          // Ensure video plays explicitly to avoid autoplay issues
          video.play().catch((e) => console.warn("Video play warning:", e));
          console.log("Camera started");
        } catch (err) {
          console.error("Camera error:", err);
          const message =
            err.message || err.name || "カメラにアクセスできません";
          area.innerHTML = `<div style="color:#d97706;text-align:center;padding:10px;">カメラ起動エラー<br><small>${message}</small></div>`;
          // Enable the upload button so the user can continue without a camera.
          setTimeout(() => {
            document.getElementById("btn-scan").classList.remove("hidden");
          }, 500);
        }
      }

      function stopCamera() {
        if (cameraStream) {
          cameraStream.getTracks().forEach((track) => track.stop());
          cameraStream = null;
          console.log("Camera stopped");
        }
      }

      function capturePhoto() {
        const video = document.querySelector("#camera-area video");
        // Ensure video exists and has loaded current data to prevent errors
        if (!video || video.readyState < 2) {
          console.warn("Video not ready for capture");
          return;
        }

        const canvas = document.createElement("canvas");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imgUrl = canvas.toDataURL("image/jpeg");

        stopCamera();

        const img = document.createElement("img");
        img.src = imgUrl;
        const cameraArea = document.getElementById("camera-area");
        // Remove existing video element but keep other UI (icon, text, scan line)
        const existingVideo = cameraArea.querySelector("video");
        if (existingVideo) existingVideo.remove();
        cameraArea.appendChild(img);

        const scanLine = document.getElementById("scan-line-ui");
        const btnScan = document.getElementById("btn-scan");

        scanLine.classList.remove("hidden");
        setTimeout(() => {
          scanLine.classList.add("hidden");
          btnScan.classList.remove("hidden");
        }, 1000);
      }

      function init() {
        loadState();
        setupEventListeners();
        switchScene("intro");
      }

      function setupEventListeners() {
        document.getElementById("btn-start").addEventListener("click", () => {
          switchScene("photo");
        });

        const cameraArea = document.getElementById("camera-area");
        const scanLine = document.getElementById("scan-line-ui");
        const btnScan = document.getElementById("btn-scan");

        cameraArea.addEventListener("click", () => {
          if (btnScan.classList.contains("hidden")) {
            capturePhoto();
          }
        });

        btnScan.addEventListener("click", () => {
          gameState.comment = document.getElementById("photo-comment").value;
          startAnalysis();
        });

        document.getElementById("btn-reset").addEventListener("click", () => {
          resetGame();
        });

        const barrels = document.querySelectorAll(".barrel");
        barrels.forEach((barrel) => {
          barrel.addEventListener("click", handleBarrelClick);
        });
      }

      function startAnalysis() {
        switchScene("analyzing");
        const progressBar = document.getElementById("analysis-progress");
        const scoreDisplay = document.getElementById("analysis-score");

        progressBar.style.width = "0%";

        setTimeout(() => {
          progressBar.style.width = "30%";
        }, 100);
        setTimeout(() => {
          progressBar.style.width = "60%";
        }, 1000);
        setTimeout(() => {
          progressBar.style.width = "100%";
        }, 2000);

        setTimeout(() => {
          const score = Math.floor(Math.random() * 30) + 70;
          gameState.score = score;
          scoreDisplay.innerText = `HAPPY SCORE: ${score}`;
          scoreDisplay.classList.remove("hidden");

          const feedback =
            score > 90 ? "完璧な王のリング！" : "とても綺麗な泡だね！";
          const messageBox = scenes.analyzing.querySelector(".message-box");
          messageBox.innerHTML = `鑑定完了！<br>ハッピー度は<strong>${score}%</strong>。<br>${feedback}`;

          setTimeout(() => {
            prepareMiniGame();
          }, 1500);
        }, 2500);
      }

      function prepareMiniGame() {
        document.getElementById("score-display").innerText = gameState.score;
        const winningIndex = Math.floor(Math.random() * 3);
        console.log("Winning barrel index:", winningIndex);
        document.getElementById("barrels-container").dataset.winner =
          winningIndex;

        document.querySelectorAll(".barrel").forEach((b) => {
          b.classList.remove("opened");
          b.innerHTML = "";
        });
        document.getElementById("game-message").innerText = "";

        switchScene("game");
      }

      function handleBarrelClick(e) {
        const container = document.getElementById("barrels-container");
        const winningIndex = parseInt(container.dataset.winner);
        const clickedIndex = parseInt(e.currentTarget.dataset.id);

        if (e.currentTarget.classList.contains("opened")) return;

        const allBarrels = document.querySelectorAll(".barrel");
        allBarrels.forEach((b) => b.classList.add("opened"));

        if (clickedIndex === winningIndex) {
          e.currentTarget.innerHTML = "🎉";
          e.currentTarget.style.color = "red";
          gameState.won = true;
          showResult(true);
        } else {
          e.currentTarget.innerHTML = "💨";
          allBarrels[winningIndex].innerHTML = "🍺";
          gameState.won = false;
          showResult(false);
        }
        saveState();
      }

      function showResult(isWin) {
        switchScene("result");
        const resultContent = document.getElementById("result-content");

        if (isWin) {
          resultContent.innerHTML = `
                <div class="avatar">🎉</div>
                <h2 style="color: var(--amber); margin-bottom: 10px;">大当たり！！</h2>
                <div class="coupon-card">
                    <h3>ドリンク1杯無料券</h3>
                    <p>次回のご注文時にご提示ください</p>
                    <div class="qr-placeholder">
                        <svg width="100" height="100" viewBox="0 0 100 100">
                            <rect x="10" y="10" width="80" height="80" fill="none" stroke="black" stroke-width="5"/>
                            <rect x="20" y="20" width="20" height="20" fill="black"/>
                            <rect x="60" y="20" width="20" height="20" fill="black"/>
                            <rect x="20" y="60" width="20" height="20" fill="black"/>
                        </svg>
                    </div>
                    <p style="font-size: 0.8rem; color: #666;">ID: ${Date.now()}</p>
                </div>
            `;
        } else {
          resultContent.innerHTML = `
                <div class="avatar">🍻</div>
                <h2 style="color: #555;">残念！はずれ...</h2>
                <div class="message-box" style="margin-top: 20px;">
                    素敵なハッピーリングありがとう！<br>
                    また次回チャレンジしてね！<br>
                    参加賞：かき氷サービス（店員さんに声をかけてね）
                </div>
            `;
        }
      }

      function resetGame() {
        gameState = {
          score: 0,
          comment: "",
          won: false,
          history: [],
        };
        document.getElementById("photo-comment").value = "";
        document.getElementById("btn-scan").classList.add("hidden");
        document.getElementById("analysis-progress").style.width = "0%";
        document.getElementById("analysis-score").classList.add("hidden");
        switchScene("intro");
      }

      window.addEventListener("resize", () => {
        console.log("Window resized");
      });

      init();
    </script>
  </body>
</html>
