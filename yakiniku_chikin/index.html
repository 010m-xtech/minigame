<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大炎上！極限の肉回し</title>
    <style>
        /* --- 1. SETUP & THEME --- */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #app {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: radial-gradient(circle at center, #1a0c02 0%, #0d0d0d 100%);
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 20px;
            border: 1px solid #222;
        }
        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .screen.active {
            display: flex;
        }

        /* --- TYPOGRAPHY --- */
        h1 {
            font-size: 32px;
            color: #ff4500;
            text-shadow: 0 0 10px rgba(255, 69, 0, 0.6);
            text-align: center;
            margin-top: 40px;
            line-height: 1.3;
        }
        h1 span { color: #ffa500; font-size: 20px; display: block; margin-bottom: 5px;}
        h2 { font-size: 24px; color: #ffa500; margin-bottom: 10px; text-align: center;}
        p { color: #ccc; font-size: 14px; text-align: center; line-height: 1.5;}

        /* --- SCREEN 1: SETUP --- */
        .setup-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: auto 0;
        }
        .input-group {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 5px 15px;
        }
        .input-group label { color: #ff4500; font-weight: bold; margin-right: 15px; width: 40px;}
        .input-group input {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 16px;
            width: 100%;
            outline: none;
        }
        .btn {
            width: 100%;
            background: linear-gradient(135deg, #ff4500 0%, #ff8c00 100%);
            color: white;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 69, 0, 0.4);
            transition: transform 0.1s;
            margin-bottom: 30px;
        }
        .btn:active { transform: scale(0.98); }

        /* --- SCREEN 2: GAMEPLAY --- */
        .turn-indicator {
            background: rgba(255, 69, 0, 0.1);
            border: 2px solid #ff4500;
            padding: 10px 30px;
            border-radius: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            margin-top: 20px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 69, 0, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 69, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 69, 0, 0); }
        }
        .meat-info { color: #ffa500; font-size: 18px; font-weight: bold; margin-top: 10px;}
        
        /* 七輪と肉の表現 */
        .shichirin {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle, #333 10%, #111 70%, #000 100%);
            border: 8px solid #444;
            box-shadow: inset 0 0 20px #ff3300, 0 10px 20px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin: auto 0;
        }
        .shichirin::before {
            content: ''; position: absolute; width: 90%; height: 90%;
            border-radius: 50%; border: 2px dashed rgba(255,255,255,0.15); z-index: 1;
        }
        .meat {
            width: 130px;
            height: 100px;
            border-radius: 30% 40% 35% 45%;
            background-color: #a01a1a; /* 生肉の赤 */
            box-shadow: inset -10px -10px 15px rgba(0,0,0,0.3), 0 5px 10px rgba(0,0,0,0.5);
            z-index: 2;
            transition: background-color 0.5s, filter 0.5s;
        }
        /* 煙のエフェクト */
        .smoke {
            position: absolute; width: 40px; height: 40px; background: rgba(255,255,255,0.08);
            border-radius: 50%; filter: blur(10px); z-index: 3; bottom: 40%; pointer-events: none; opacity: 0;
        }
        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.3; }
            100% { transform: translateY(-100px) scale(2.5); opacity: 0; }
        }

        .game-actions {
            display: flex;
            width: 100%;
            gap: 15px;
            margin-bottom: 20px;
        }
        .btn-action {
            flex: 1;
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        .btn-stay { background: #333; border: 2px solid #555; }
        .btn-stay:active { background: #444; }
        .btn-eat { background: linear-gradient(135deg, #00c853 0%, #b2ff59 100%); color: #000; }
        .btn-eat:active { opacity: 0.9; }

        /* --- SCREEN 3: RESULT --- */
        .result-box {
            text-align: center;
            margin-top: 30px;
        }
        .evaluation {
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .eval-perfect { color: #ffd700; text-shadow: 0 0 15px rgba(255,215,0,0.5); }
        .eval-welldone { color: #ff8c00; }
        .eval-raw { color: #ff8a80; }
        .eval-burn { color: #555555; text-shadow: none; }
        
        .score-board {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            border: 1px solid #222;
        }
        .score-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #222;
        }
        .score-row:last-child { border-bottom: none; }
        .penalty-card {
            background: #1a0000;
            border: 2px dashed #ff4500;
            border-radius: 8px;
            padding: 15px;
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
        }
        .penalty-title { color: #ff4500; font-weight: bold; font-size: 16px; margin-bottom: 5px;}
        .penalty-text { font-size: 18px; font-weight: bold; color: #fff;}
    </style>
</head>
<body>

<div id="app">
    <div id="screen-setup" class="screen active">
        <h1><span>宴会用ミニゲーム</span>大炎上！極限の肉回し</h1>
        <p>スマホを時計回りに回して遊ぶチキンレース！<br>前の奴の「焼き秒数」を脳内計算し、極上の肉を喰らえ！</p>
        
        <div class="setup-form">
            <div class="input-group"><label>P1</label><input type="text" id="p0-name" value="タン塩次郎"></div>
            <div class="input-group"><label>P2</label><input type="text" id="p1-name" value="カルビ太郎"></div>
            <div class="input-group"><label>P3</label><input type="text" id="p2-name" value="ハラミ花子"></div>
            <div class="input-group"><label>P4</label><input type="text" id="p3-name" value="ホルモン大将"></div>
        </div>

        <button class="btn" onclick="startGame()">網に肉を乗せる（スタート）</button>
    </div>

    <div id="screen-game" class="screen">
        <div id="current-player" class="turn-indicator">○○ のターン！</div>
        <div id="meat-type" class="meat-info">出現した肉: 特上カルビ</div>
        
        <div class="shichirin">
            <div id="meat-obj" class="meat"></div>
            <div id="smoke1" class="smoke" style="left:40%;"></div>
            <div id="smoke2" class="smoke" style="left:55%;"></div>
        </div>

        <p style="color:#888;">【ステイ】は1秒焼いて次の人へ回す！<br>完璧な焼き加減だと思ったら【イート】！</p>

        <div class="game-actions">
            <button class="btn-action btn-stay" id="btn-stay" onclick="handleStay()">🔥 ステイ (＋1秒)</button>
            <button class="btn-action btn-eat" onclick="handleEat()">🥢 イート！</button>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <h1><span>結果発表</span>宴の終焉</h1>
        
        <div class="result-box">
            <div id="res-eval" class="evaluation">PERFECT!!</div>
            <p id="res-detail">トータル焼き時間: 6.2秒</p>
        </div>

        <div class="score-board" id="score-board-list">
            </div>

        <div class="penalty-card">
            <div class="penalty-title">🚨 大戦犯へのペナルティ 🚨</div>
            <div id="penalty-text" class="penalty-text">奢りの一太刀（次の一品をドベが奢る）</div>
        </div>

        <button class="btn" onclick="resetGame()">もう一皿焼く</button>
    </div>
</div>

<script>
    /* --- GAME CONFIG & STATE --- */
    const MEAT_TYPES = [
        { name: "特上カルビ (目標: 6.0秒)", target: 6.0 },
        { name: "厚切り牛タン (目標: 4.0秒)", target: 4.0 },
        { name: "極厚ハラミ (目標: 8.0秒)", target: 8.0 }
    ];

    const PENALTIES = [
        "奢りの一太刀（1位が指定した次の一品を奢る）",
        "終身焼き奉行（この後の宴会中、すべての肉を焼く役になる）",
        "ドリンク奴隷（全員のグラスが空いたら即座に注文を取る）",
        "ニンニクの洗礼（次の肉に通常の3倍ニンニクを乗せて食べる）"
    ];

    let players = [];
    let currentMeat = {};
    let currentPlayerIdx = 0;
    let accumulatedTime = 0;
    let scores = [0, 0, 0, 0];
    let smokeInterval;

    // 音響効果用（ブラウザのWeb Audio APIを使用）
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(freq, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
    }

    /* --- SCENE NAVIGATION --- */
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    /* --- GAME LOGIC --- */
    function startGame() {
        // プレイヤー名の取得
        players = [
            document.getElementById('p0-name').value || "プレイヤー1",
            document.getElementById('p1-name').value || "プレイヤー2",
            document.getElementById('p2-name').value || "プレイヤー3",
            document.getElementById('p3-name').value || "プレイヤー4"
        ];

        // 状態のリセット
        currentPlayerIdx = Math.floor(Math.random() * 4); // 最初の人はランダム
        accumulatedTime = 0;
        currentMeat = MEAT_TYPES[Math.floor(Math.random() * MEAT_TYPES.length)];
        
        // 画面の更新
        document.getElementById('meat-type').innerText = `出現した肉: ${currentMeat.name}`;
        updateTurnUI();
        updateMeatAppearance();
        
        // 煙アニメーションの開始
        startSmoke();

        showScreen('screen-game');
        playBeep(440, 0.2);
    }

    function updateTurnUI() {
        document.getElementById('current-player').innerText = `🔥 ${players[currentPlayerIdx]} の番！`;
    }

    function updateMeatAppearance() {
        const meatObj = document.getElementById('meat-obj');
        // 時間経過による肉の色の変化 (生肉の赤 -> 茶色 -> 黒)
        let progress = accumulatedTime / currentMeat.target;
        
        if (progress < 0.7) {
            // 生焼け期（赤〜薄茶）
            meatObj.style.backgroundColor = `rgb(${160 - (progress * 60)}, ${26 + (progress * 50)}, ${26 + (progress * 20)})`;
            meatObj.style.filter = "none";
        } else if (progress <= 1.1) {
            // 食べ頃（良い焼き色の茶色）
            meatObj.style.backgroundColor = "#5c2c16";
            meatObj.style.filter = "contrast(1.2)";
        } else {
            // 黒焦げ期
            let burnProgress = Math.min((progress - 1.1) * 2, 1);
            let colorVal = 92 - (burnProgress * 70);
            meatObj.style.backgroundColor = `rgb(${colorVal}, ${colorVal * 0.5}, ${colorVal * 0.5})`;
            meatObj.style.filter = "grayscale(0.8) brightness(0.4)";
        }
    }

    function startSmoke() {
        clearInterval(smokeInterval);
        smokeInterval = setInterval(() => {
            if (accumulatedTime > currentMeat.target * 0.7) {
                const s1 = document.getElementById('smoke1');
                const s2 = document.getElementById('smoke2');
                s1.style.animation = "rise 1s infinite ease-out";
                s2.style.animation = "rise 1.2s infinite ease-out 0.3s";
                
                // 焦げに近づくほど煙を濃くする
                let opacity = Math.min((accumulatedTime / currentMeat.target) * 0.3, 0.8);
                s1.style.background = `rgba(255,255,255,${opacity})`;
                s2.style.background = `rgba(255,255,255,${opacity})`;
            }
        }, 500);
    }

    function stopSmoke() {
        clearInterval(smokeInterval);
        document.getElementById('smoke1').style.animation = "none";
        document.getElementById('smoke2').style.animation = "none";
    }

    function handleStay() {
        // 誤連打防止のために一瞬ボタン無効化
        const btn = document.getElementById('btn-stay');
        btn.disabled = true;
        setTimeout(() => btn.disabled = false, 300);

        // 1秒追加（肉が焼ける音を鳴らす）
        accumulatedTime += 1.0;
        playBeep(880, 0.05);
        if (navigator.vibrate) navigator.vibrate(40); // スマホなら微振動

        updateMeatAppearance();

        // 焦げ限界を大幅に突破（ターゲットの1.5倍の秒数）したら強制バースト
        if (accumulatedTime >= currentMeat.target * 1.5) {
            endGame(true); // 強制黒焦げ終了
            return;
        }

        // 次のプレイヤーへ
        currentPlayerIdx = (currentPlayerIdx + 1) % 4;
        updateTurnUI();
    }

    function handleEat() {
        endGame(false);
    }

    function endGame(isForcedBurn) {
        stopSmoke();
        playBeep(220, 0.5);

        let evalText = "";
        let evalClass = "";
        let turnScore = 0;
        let diff = Math.abs(accumulatedTime - currentMeat.target);

        // 焼き加減の判定
        if (isForcedBurn || accumulatedTime >= currentMeat.target * 1.3) {
            evalText = "黒焦げ (Burned...)";
            evalClass = "eval-burn";
            turnScore = -50;
            scores[currentPlayerIdx] += turnScore;
        } else if (diff <= 0.5) {
            evalText = "神の焼き加減 (Perfect!!)";
            evalClass = "eval-perfect";
            turnScore = 100;
            scores[currentPlayerIdx] += turnScore;
        } else if (accumulatedTime < currentMeat.target) {
            evalText = "まだ生焼け (Raw...)";
            evalClass = "eval-raw";
            turnScore = 20;
            scores[currentPlayerIdx] += turnScore;
        } else {
            evalText = "よく焼き (Well-done)";
            evalClass = "eval-welldone";
            turnScore = 60;
            scores[currentPlayerIdx] += turnScore;
        }

        // 結果画面のUI反映
        const evalObj = document.getElementById('res-eval');
        evalObj.innerText = evalText;
        evalObj.className = `evaluation ${evalClass}`;
        document.getElementById('res-detail').innerText = `${players[currentPlayerIdx]} が回収した時のタイム: ${accumulatedTime.toFixed(1)}秒\n(目標: ${currentMeat.target}秒)`;

        // スコアボードの生成
        const board = document.getElementById('score-board-list');
        board.innerHTML = "<h2>現在の累積スコア</h2>";
        
        // 最下位（ドベ）の算出用
        let lowestScore = Infinity;
        let loserIdx = 0;

        players.forEach((name, idx) => {
            if (scores[idx] < lowestScore) {
                lowestScore = scores[idx];
                loserIdx = idx;
            }
            board.innerHTML += `
                <div class="score-row">
                    <span style="${idx === currentPlayerIdx ? 'color:#ff8c00; font-weight:bold;' : ''}">${name} ${idx === currentPlayerIdx ? '★' : ''}</span>
                    <span>${scores[idx]} pts</span>
                </div>
            `;
        });

        // ペナルティのランダム決定
        const randomPenalty = PENALTIES[Math.floor(Math.random() * PENALTIES.length)];
        document.getElementById('penalty-text').innerText = `${players[loserIdx]} ➡️ ${randomPenalty}`;

        showScreen('screen-result');
    }

    function resetGame() {
        showScreen('screen-setup');
    }
</script>
</body>
</html>
