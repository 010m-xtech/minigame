<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ティンカーベルとロンドンの夜空 - 初期位置指定版</title>
    <style>
        /* 画面全体の基本設定（縦長1939px * 1082px の画像に最適化） */
        body {
            margin: 0;
            padding: 0;
            background-image: url("nightview.png");
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            overflow: hidden;
            height: 100vh;
            position: relative;
            cursor: none; /* 元のマウスカーソルを消す */
        }

        /* マウスカーソル（または指）になる妖精の設定 */
        #tinkerbell {
            position: fixed;
            width: 50px;  /* 妖精のサイズ */
            height: 50px;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%); /* 中心をカーソル位置に合わせる */
            
            /* ご指定の妖精のPNG画像をセット */
            background-image: url("pixielight.png");
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;

            /* 透明化した明かりでやさしく光らせるフィルター効果 */
            filter: drop-shadow(0 0 8px rgba(255, 235, 180, 0.95)) 
                    drop-shadow(0 0 18px rgba(255, 200, 130, 0.7));
        }

        /* 水色の魔法の粉（ピクシーダスト）の共通設定 */
        .pixie-dust {
            position: fixed;
            top: 0;
            left: 0;
            width: 12px;
            height: 12px;
            background-color: #a7f3d0; /* 柔らかな光るミント水色 */
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #38bdf8, 0 0 18px #0ea5e9; 
        }

        /* 案内テキスト */
        .title {
            position: absolute;
            top: 20%;
            width: 100%;
            text-align: center;
            color: #e2e8f0;
            font-family: 'Georgia', serif;
            letter-spacing: 2px;
            pointer-events: none;
            text-shadow: 0 3px 6px rgba(0,0,0,0.6);
        }
        h1 { font-size: 28px; font-weight: normal; opacity: 0.9; }
    </style>
</head>
<body>

    <div class="title">
        <h1>You can fly!</h1>
    </div>

    <div id="tinkerbell"></div>

    <script>
        // 【重要】ご指定の初期座標を設定
        const START_X = 626;
        const START_Y = 1592;

        const tink = document.getElementById('tinkerbell');
        const DUST_COUNT = 30; 
        const dustParticles = [];
        
        // マウスの位置を記録する変数の初期値を設定
        const mouse = { x: START_X, y: START_Y };

        // ページが開いた瞬間に、妖精をご指定の初期位置へ配置する
        tink.style.left = START_X + 'px';
        tink.style.top = START_Y + 'px';

        // 魔法の粉のドットを自動生成（初期位置にまとめて配置）
        for (let i = 0; i < DUST_COUNT; i++) {
            const dust = document.createElement('div');
            dust.classList.add('pixie-dust');
            
            // 後ろにいくほど小さく、そして透明にする
            const scale = 1 - (i / DUST_COUNT);
            const opacity = 1 - (i / DUST_COUNT);
            dust.style.transform = `translate(-50%, -50%) scale(${scale})`;
            dust.style.opacity = opacity;
            
            const mixColor = i % 2 === 0 ? '#e0f2fe' : '#7dd3fc';
            dust.style.backgroundColor = mixColor;

            // 初期位置を設定
            dust.style.left = START_X + 'px';
            dust.style.top = START_Y + 'px';

            document.body.appendChild(dust);
            
            dustParticles.push({
                element: dust,
                x: START_X,
                y: START_Y
            });
        }

        // 位置を更新する共通関数
        function updatePosition(x, y) {
            mouse.x = x;
            mouse.y = y;
            tink.style.left = x + 'px';
            tink.style.top = y + 'px';
        }

        // マウス操作
        window.addEventListener('mousemove', (e) => {
            updatePosition(e.clientX, e.clientY);
        });

        // スマホなどのタッチ操作
        window.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) {
                e.preventDefault(); // スクロール防止
                updatePosition(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });

        window.addEventListener('touchstart', (e) => {
            if(e.touches.length > 0) {
                updatePosition(e.touches[0].clientX, e.touches[0].clientY);
            }
        });

        // アニメーションループ（時間差でスルスル追いかける）
        function animate() {
            let targetX = mouse.x;
            let targetY = mouse.y;

            dustParticles.forEach((dust, index) => {
                dust.x += (targetX - dust.x) * 0.22;
                dust.y += (targetY - dust.y) * 0.22;

                dust.element.style.left = dust.x + 'px';
                dust.element.style.top = dust.y + 'px';

                targetX = dust.x;
                targetY = dust.y;
            });

            requestAnimationFrame(animate);
        }

        // アニメーションをスタート！
        animate();
    </script>
</body>
</html>
