<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>肩のせふくろうAR (軽量版)</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f0f0f0; margin: 0; padding: 20px; }
        #container { position: relative; width: 100%; max-width: 640px; aspect-ratio: 4 / 3; border: 2px solid #ff6600; border-radius: 10px; overflow: hidden; background-color: #333; }
        video#webcam { position: absolute; width: 100%; height: 100%; top: 0; left: 0; object-fit: cover; transform: scaleX(-1); }
        canvas#output_canvas { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; transform: scaleX(-1); }
        .controls { margin-top: 20px; display: flex; gap: 10px; }
        .btn { padding: 10px 20px; background: #ff6600; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        #status_msg { margin-top: 10px; color: #ff6600; font-weight: bold; }
    </style>
</head>
<body>

    <h2>肩のせふくろうAR</h2>
    <div id="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div id="status_msg">「カメラ起動」を押してください</div>

    <div class="controls">
        <button id="start_btn" class="btn">カメラ起動</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const startBtn = document.getElementById('start_btn');
        const statusMsg = document.getElementById('status_msg');

        // 画像の読み込み
        const owlImage = new Image();
        owlImage.src = 'owl_overlay.png'; 
        let owlLoaded = false;
        owlImage.onload = () => { owlLoaded = true; };
        owlImage.onerror = () => { statusMsg.innerText = "エラー: owl_overlay.png が見つかりません"; };

        let pose;
        let camera;

        function onResults(results) {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks && owlLoaded) {
                const leftShoulder = results.poseLandmarks[11]; // 左肩
                const rightShoulder = results.poseLandmarks[12]; // 右肩

                // どちらか認識されているほうを使う（判定を0.4に下げて甘くしました）
                let targetShoulder = null;
                if (leftShoulder && leftShoulder.visibility > 0.4) {
                    targetShoulder = leftShoulder;
                } else if (rightShoulder && rightShoulder.visibility > 0.4) {
                    targetShoulder = rightShoulder;
                }

                if (targetShoulder) {
                    statusMsg.innerText = "肩を認識中！ふくろう出現！";
                    const shoulderX = targetShoulder.x * canvasElement.width;
                    const shoulderY = targetShoulder.y * canvasElement.height;

                    const owlSize = canvasElement.width * 0.25; // 少し大きくしました
                    const aspect = owlImage.width / owlImage.height;
                    const drawWidth = owlSize;
                    const drawHeight = owlSize / aspect;

                    const offsetX = -drawWidth / 2;
                    const offsetY = -drawHeight * 0.9;

                    canvasCtx.drawImage(owlImage, shoulderX + offsetX, shoulderY + offsetY, drawWidth, drawHeight);
                } else {
                    statusMsg.innerText = "体を画面に映してください（肩を探しています）";
                }
            } else {
                statusMsg.innerText = "人物を検出中...";
            }
        }

        async function initializePose() {
            statusMsg.innerText = 'AI起動中...しばらくお待ちください';
            startBtn.disabled = true;

            pose = new Pose({locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
            }});

            pose.setOptions({
                modelComplexity: 0, // 0に設定して超軽量化！スマホでも動きやすく
                smoothLandmarks: true,
                minDetectionConfidence: 0.4,
                minTrackingConfidence: 0.4
            });
            pose.onResults(onResults);

            try {
                camera = new Camera(videoElement, {
                    onFrame: async () => {
                        await pose.send({image: videoElement});
                    },
                    width: 640, // 解像度を下げてさらに軽く
                    height: 480,
                    facingMode: "user"
                });
                await camera.start();
                statusMsg.innerText = 'カメラが起動しました！上半身を映してください';
            } catch (error) {
                statusMsg.innerText = 'カメラの起動に失敗しました（SafariやChromeで開いていますか？）';
                startBtn.disabled = false;
            }
        }

        videoElement.addEventListener('loadedmetadata', () => {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
        });

        startBtn.addEventListener('click', initializePose);
    </script>
</body>
</html>

</body>
</html>
