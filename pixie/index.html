<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テスト用（画像なしで動く版）</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #0b1526; /* 画像の代わりに濃い紺色 */
            overflow: hidden; height: 100vh; position: relative; cursor: none; 
        }
        /* 妖精の代わりに「黄色い光の丸」にします */
        #tinkerbell {
            position: fixed; width: 30px; height: 30px;
            background-color: #ffeb3b; border-radius: 50%;
            pointer-events: none; z-index: 10000; transform: translate(-50%, -50%); 
            box-shadow: 0 0 15px #ffeb3b, 0 0 30px #ff9800;
        }
        .pixie-dust {
            position: fixed; top: 0; left: 0; width: 12px; height: 12px;
            background-color: #a7f3d0; border-radius: 50%;
            pointer-events: none; z-index: 9999; transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #38bdf8, 0 0 18px #0ea5e9; 
        }
    </style>
</head>
<body>
    <div id="tinkerbell"></div>
    <script>
        // PCでも見えやすいように、テスト用に初期座標を画面中央付近にします
        const START_X = window.innerWidth / 2;
        const START_Y = window.innerHeight * 0.7;

        const tink = document.getElementById('tinkerbell');
        const DUST_COUNT = 35; 
        const dustParticles = [];
        const mouse = { x: START_X, y: START_Y };

        let isAutoFlying = true;
        let startTime = null;
        const FLY_DURATION = 2000;

        tink.style.left = START_X + 'px';
        tink.style.top = START_Y + 'px';

        for (let i = 0; i < DUST_COUNT; i++) {
            const dust = document.createElement('div');
            dust.classList.add('pixie-dust');
            const scale = 1 - (i / DUST_COUNT);
            const opacity = 1 - (i / DUST_COUNT);
            dust.style.transform = `translate(-50%, -50%) scale(${scale})`;
            dust.style.opacity = opacity;
            const mixColor = i % 2 === 0 ? '#e0f2fe' : '#7dd3fc';
            dust.style.backgroundColor = mixColor;
            dust.style.left = START_X + 'px';
            dust.style.top = START_Y + 'px';
            document.body.appendChild(dust);
            dustParticles.push({ element: dust, x: START_X, y: START_Y });
        }

        function updatePosition(x, y) {
            if (isAutoFlying) return; 
            mouse.x = x; mouse.y = y;
            tink.style.left = x + 'px'; tink.style.top = y + 'px';
        }
        window.addEventListener('mousemove', (e) => { updatePosition(e.clientX, e.clientY); });
        window.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) { e.preventDefault(); updatePosition(e.touches[0].clientX, e.touches[0].clientY); }
        }, { passive: false });

        function animate(timestamp) {
            if (!startTime) startTime = timestamp;
            const elapsed = timestamp - startTime;

            if (isAutoFlying) {
                if (elapsed < FLY_DURATION) {
                    const progress = elapsed / FLY_DURATION; 
                    const angle = progress * Math.PI * 2; 
                    const heartScale = window.innerWidth * 0.35; 

                    const hX = 16 * Math.pow(Math.sin(angle), 3);
                    const hY = -(13 * Math.cos(angle) - 5 * Math.cos(2*angle) - 2 * Math.cos(3*angle) - Math.cos(4*angle));

                    const heartX = START_X + (hX * (heartScale / 16));
                    const heartY = (START_Y - heartScale) + (hY * (heartScale / 16));

                    mouse.x = heartX * (1 - progress) + START_X * progress;
                    mouse.y = heartY * (1 - progress) + START_Y * progress;

                    tink.style.left = mouse.x + 'px';
                    tink.style.top = mouse.y + 'px';
                } else {
                    isAutoFlying = false;
                    mouse.x = START_X; mouse.y = START_Y;
                    tink.style.left = START_X + 'px'; tink.style.top = START_Y + 'px';
                }
            }

            let targetX = mouse.x; let targetY = mouse.y;
            dustParticles.forEach((dust) => {
                dust.x += (targetX - dust.x) * 0.22; 
                dust.y += (targetY - dust.y) * 0.22;
                dust.element.style.left = dust.x + 'px';
                dust.element.style.top = dust.y + 'px';
                targetX = dust.x; targetY = dust.y;
            });
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    </script>
</body>
</html>
